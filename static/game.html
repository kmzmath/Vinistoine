function onTargetClick(targetId) {
  if (targetingMode) {
    targetingMode.targets = targetingMode.targets || [];
    targetingMode.targets.push(targetId);

    const needed = (targetingMode.targetDescs || []).length || 1;
    if (targetingMode.targets.length < needed) {
      const next = (targetingMode.targetDescs || [])[targetingMode.targets.length] || {};
      const hint = next.valid && next.valid.includes("FRIENDLY_MINION")
        ? "Escolha um lacaio aliado"
        : next.valid && next.valid.includes("ENEMY_MINION")
          ? "Escolha um lacaio inimigo"
          : "Escolha o próximo alvo";
      toast(`${hint} (${targetingMode.targets.length + 1}/${needed})`);
      return;
    }

    const payload = {
      hand_id: targetingMode.hand_id,
      target: targetingMode.targets[0],
      targets: targetingMode.targets,
    };
    if (typeof targetingMode.chose_index === "number") {
      payload.chose_index = targetingMode.chose_index;
    }
    if (targetingMode.empowered) {
      payload.empowered = true;
    }
    if (targetingMode.requiresDirection) {
      targetingMode = null;
      showAdjacentDirectionModal(payload);
      return;
    }
    sendPlayCard(payload);
    targetingMode = null;
    return;
  }
  if (abilityMode) {
    send("activate_ability", {
      minion_id: abilityMode.minion_id,
      ability_index: abilityMode.ability_index || 0,
      target: targetId,
      targets: [targetId],
    });
    abilityMode = null;
    return;
  }
  if (attackingMode) {
    send("attack", { attacker_id: attackingMode.attacker_id, target_id: targetId });
    attackingMode = null;
    return;
  }
}

function cancelModes() {
  targetingMode = null;
  attackingMode = null;
  abilityMode = null;
  // Cancela qualquer posição de drop pendente para que ela não vaze para
  // a próxima jogada (caso o jogador tenha começado um drag de minion com
  // battlecry e cancelou no meio do targeting via ESC).
  pendingPlayPosition = null;
  removeAimLine();
  // Também fecha o preview de hover - cancelar modo via ESC normalmente
  // dispara um render(), mas em alguns fluxos (clique em área vazia, p.ex.)
  // chamamos só cancelModes sem rerender.
  clearTimeout(hoverPreviewTimer);
  hoverPreviewTimer = null;
  hideMinionCardPreview();
}

// Rede de segurança global: se o cursor sair da janela (ex: usuário trocou
// de aba do navegador) o preview deve sumir, já que nenhum mouseleave de
// elemento individual vai disparar.
document.addEventListener("mouseleave", () => {
  clearTimeout(hoverPreviewTimer);
  hoverPreviewTimer = null;
  hideMinionCardPreview();
});
window.addEventListener("blur", () => {
  clearTimeout(hoverPreviewTimer);
  hoverPreviewTimer = null;
  hideMinionCardPreview();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    cancelModes();
    render();
  }
});

// =========== Aim line (seta de mira) ===========
let aimLineEl = null;
function removeAimLine() {
  if (aimLineEl) { aimLineEl.remove(); aimLineEl = null; }
}
document.addEventListener("mousemove", (e) => {
  mousePos = { x: e.clientX, y: e.clientY };
  if (!attackingMode && !targetingMode && !abilityMode) { removeAimLine(); return; }
  drawAimLine();
});
function drawAimLine() {
  let originEl = null;
  if (attackingMode) {
    originEl = document.querySelector(`.minion[data-minion-id='${attackingMode.attacker_id}']`);
  } else if (abilityMode) {
    originEl = document.querySelector(`.minion[data-minion-id='${abilityMode.minion_id}']`);
  } else if (targetingMode) {
    // origem: hero do jogador (centro da tela, parte de baixo)
    originEl = document.querySelector(`.hero[data-hero-owner='${myPid}'] .portrait-wrap`);
  }
  if (!originEl) { removeAimLine(); return; }
  const r = originEl.getBoundingClientRect();
  const x0 = r.left + r.width / 2;
  const y0 = r.top + r.height / 2;
  const dx = mousePos.x - x0;
  const dy = mousePos.y - y0;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx) * 180 / Math.PI;
  if (!aimLineEl) {
    aimLineEl = document.createElement("div");
    aimLineEl.className = "aim-line";
    document.body.appendChild(aimLineEl);
  }
  aimLineEl.style.left = x0 + "px";
  aimLineEl.style.top = (y0 - 2) + "px";
  aimLineEl.style.width = len + "px";
  aimLineEl.style.transform = `rotate(${ang}deg)`;
}

// ============ ANIMAÇÕES baseadas no delta de estado ============
function animateFromDelta(oldS, newS) {
  // Indexa minions por instance_id pra comparar HP/atk
  const oldByid = {};
  const newByid = {};
  for (const p of [oldS.you, oldS.opponent]) {
    for (const m of p.board) oldByid[m.instance_id] = m;
  }
  for (const p of [newS.you, newS.opponent]) {
    for (const m of p.board) newByid[m.instance_id] = m;
  }

  // Eventos novos (do log). Não use apenas tamanho: o servidor envia só os
  // últimos 50 eventos, então depois de um tempo os tamanhos podem ser iguais
  // mesmo com eventos novos.
  const oldSeqs = new Set((oldS.log || []).map(ev => ev.seq).filter(v => v !== undefined));
  const newEvents = (newS.log || []).filter(ev => ev.seq === undefined || !oldSeqs.has(ev.seq));
  const normalizeImpactId = (value) => {
    if (value === null || value === undefined) return null;
    if (typeof value === "string" || typeof value === "number") return String(value);
    return null;
  };
  const attackImpactIds = new Set();
  const damageAmountByMinion = new Map();
  let hasAttackAnimation = false;
  for (const ev of newEvents) {
    if (ev.type === "attack" || ev.type === "forced_attack") {
      hasAttackAnimation = true;
      const attackerId = normalizeImpactId(ev.attacker);
      if (attackerId) attackImpactIds.add(attackerId);
      const targetId = normalizeImpactId(ev.target);
      if (targetId) attackImpactIds.add(targetId);
    }
    if (ev.type === "damage" && ev.target_kind === "minion" && ev.target_id) {
      const id = String(ev.target_id);
      damageAmountByMinion.set(id, (damageAmountByMinion.get(id) || 0) + (Number(ev.amount) || 0));
    }
  }
  const renderDelay = hasAttackAnimation ? ATTACK_STATE_RENDER_DELAY_MS : 0;
  const impactDelayFor = (id) => {
    const impactId = normalizeImpactId(id);
    return impactId && attackImpactIds.has(impactId) ? ATTACK_IMPACT_MS : 0;
  };

  // Para cada lacaio que sumiu (morreu), animar dying no último frame antes
  // da renderização que remove o lacaio. Em ataques, isso segura a morte até
  // o atacante terminar de ir ao alvo e voltar.
  const deadIds = Object.keys(oldByid).filter(id => !newByid[id]);
  for (const id of deadIds) {
    const lethalDamage = damageAmountByMinion.get(String(id));
    const dyingDelay = Math.max(renderDelay, impactDelayFor(id));
    queueDyingMinion(id, lethalDamage, dyingDelay);
  }

  // Mudanças de HP / divine shield em lacaios que continuam
  for (const id in newByid) {
    const o = oldByid[id]; const n = newByid[id];
    if (!o) continue;
    if (n.health < o.health) {
      const dmg = o.health - n.health;
      queueShake(`.minion[data-minion-id='${id}']`, "dmg", dmg, impactDelayFor(id));
    } else if (n.health > o.health) {
      const heal = n.health - o.health;
      queueShake(`.minion[data-minion-id='${id}']`, "heal", heal);
    }
    if (o.divine_shield && !n.divine_shield) {
      queueShake(`.minion[data-minion-id='${id}']`, "shield", "✦");
    }
  }

  // Mudança de HP em heróis
  if (newS.you.hero_health < oldS.you.hero_health) {
    queueShake(`.hero[data-hero-owner='${newS.you.player_id}']`, "dmg",
               oldS.you.hero_health - newS.you.hero_health,
               impactDelayFor(`hero:${newS.you.player_id}`));
  } else if (newS.you.hero_health > oldS.you.hero_health) {
    queueShake(`.hero[data-hero-owner='${newS.you.player_id}']`, "heal",
               newS.you.hero_health - oldS.you.hero_health);
  }
  if (newS.opponent.hero_health < oldS.opponent.hero_health) {
    queueShake(`.hero[data-hero-owner='${newS.opponent.player_id}']`, "dmg",
               oldS.opponent.hero_health - newS.opponent.hero_health,
               impactDelayFor(`hero:${newS.opponent.player_id}`));
  } else if (newS.opponent.hero_health > oldS.opponent.hero_health) {
    queueShake(`.hero[data-hero-owner='${newS.opponent.player_id}']`, "heal",
               newS.opponent.hero_health - oldS.opponent.hero_health);
  }

  // Eventos do log: ataques, summons, draws (de qualquer jogador) e cartas
  // jogadas pelo oponente.
  for (const ev of newEvents) {
    if (ev.type === "attack" || ev.type === "forced_attack") {
      animateAttack(ev.attacker, ev.target);
    }
    if (ev.type === "summon") {
      const newMinionId = ev.minion?.instance_id;
      if (newMinionId) {
        setTimeout(() => {
          const el = document.querySelector(`.minion[data-minion-id='${newMinionId}']`);
          if (el) {
            el.classList.add("entering");
            setTimeout(() => el.classList.remove("entering"), 500);
          }
        }, renderDelay + 30);
      }
    }
    // === Compra de carta (qualquer jogador) ===
    if (ev.type === "draw" || ev.type === "draw_minion" ||
        ev.type === "draw_spell" || ev.type === "steal_card") {
      // Identifica o jogador que comprou
      const player = ev.player ?? ev.to;
      // Para uma compra normal, ev.instance_id é o id da carta nova
      const inst = ev.instance_id;
      // Se SOU eu que comprei, preciso descobrir o card_id pra mostrar a
      // imagem da carta. Se foi o oponente, mostro só o card-back voando.
      let cardIdRevealed = null;
      if (player === myPid && inst) {
        // newS.you.hand já tem a carta nova (último item ou pelo instance_id)
        const handCard = (newS.you.hand || []).find(c => c.instance_id === inst);
        if (handCard) cardIdRevealed = handCard.card_id;
      }
      scheduleDrawAnimation(player, cardIdRevealed, ev.reason || "effect", inst || null);
    }
    // === Anúncio de carta jogada pelo oponente ===
    if (ev.type === "play_card" && ev.player !== myPid) {
      enqueueOpponentPlay(ev);
    }
    // === Revelação de topo de ambos os decks: Stonks / Abridor de Caixa ===
    if (ev.type === "reveal_top_each_deck" && ev.cards && ev.cards.length) {
      enqueueOpponentPlay({
        type: "reveal_pair",
        cards: ev.cards,
        reveal_label: "Cartas reveladas",
      });
    }
    if (ev.type === "reveal_and_steal_top_deck_cards") {
      const cards = (ev.cards || (ev.card_ids || []).map(cid => ({ owner: ev.opponent, card_id: cid })));
      if (cards.length) {
        enqueueOpponentPlay({
          type: "reveal_pair",
          player: ev.player,
          cards,
          reveal_label: `${playerName(ev.player)} roubou ${cards.length} carta(s) revelada(s)`,
        });
      }
    }
    if (ev.type === "discard_lowest_revealed" && ev.card_id) {
      enqueueOpponentPlay({
        type: "burn",
        player: ev.player ?? ev.owner,
        card_id: ev.card_id,
        card_name: (allCards[ev.card_id] || {}).name || ev.card_id,
        reveal_label: "Carta descartada",
        burned: true,
      });
    }
    if (ev.type === "draw_highest_revealed" && ev.card_id) {
      enqueueOpponentPlay({
        type: "draw_revealed",
        player: ev.player ?? ev.winner,
        card_id: ev.card_id,
        card_name: (allCards[ev.card_id] || {}).name || ev.card_id,
        reveal_label: "Carta comprada",
      });
    }
    // === Queima de carta por mão cheia ===
    // O dono vê a carta grande no centro com animação de queima (igual ao
    // showcase de compra). O oponente vê a revelação no anunciador.
    if (ev.type === "burn" && ev.card_id) {
      if (ev.player === myPid) {
        flyBurnCard(ev.card_id);
      } else {
        enqueueOpponentPlay({
          type: "burn",
          player: ev.player,
          card_id: ev.card_id,
          card_name: (allCards[ev.card_id] || {}).name || ev.card_id,
          reveal_label: "Carta queimada",
          burned: true,
        });
      }
    }
    // === Carta revelada da mão / compra revelada ===
    if (ev.type === "reveal_hand_card" || ev.type === "reveal_drawn_card") {
      showRevealNotice(ev);
    }
    // === El Gusnabito: revela 1ª e última carta da mão do oponente ===
    if (ev.type === "reveal_hand_edges" && (ev.cards || []).length) {
      const cards = (ev.cards || []).map(c => ({
        owner: ev.player,
        card_id: c.card_id,
      }));
      enqueueOpponentPlay({
        type: "reveal_pair",
        player: ev.player,
        cards,
        reveal_label: ev.player === myPid
          ? "Sua mão revelada"
          : "Mão do oponente revelada",
      });
    }
  }
  return renderDelay;
}

// =================== ANIMAÇÃO DE COMPRA ===================
// Para cada draw: cartinha sai do deck-pile do dono e voa até a mão dele.
// - Se a carta é minha e eu sei o card_id, mostro a imagem da carta
//   (ou fallback textual)
// - Se é do oponente, mostro só o card-back (ele esconde o conteúdo)
// Próximo timestamp em que uma nova animação pode começar. Multiplicar por
// `count * duration` (versão antiga) somava durations heterogêneos errados:
// uma compra de 3s podia ser disparada com delay 1000ms, ou uma de 1s com
// delay 6000ms. Usar um cursor evita sobreposição e gaps grandes.
let nextDrawAnimAt = 0;
const arrivingDrawHandIds = new Set();
const TURN_START_DRAW_MS = 3000;
const EFFECT_DRAW_MS = 1000;
const OPPONENT_DRAW_MS = 700;
function scheduleDrawAnimation(playerId, cardIdRevealed, reason = "effect", targetHandId = null) {
  const isMine = playerId === myPid;
  const duration = !isMine ? OPPONENT_DRAW_MS : (reason === "turn_start" ? TURN_START_DRAW_MS : EFFECT_DRAW_MS);
  const now = Date.now();
  const startAt = Math.max(now, nextDrawAnimAt);
  const delay = startAt - now;
  nextDrawAnimAt = startAt + duration;
  if (isMine && targetHandId) arrivingDrawHandIds.add(String(targetHandId));
  setTimeout(() => {
    flyDrawCard(playerId, cardIdRevealed, {
      duration,
      showcase: isMine && reason === "turn_start",
      targetHandId,
    });
  }, delay);
}

function buildAnimatedCard(cardId, faceDown = false) {
  const wrap = document.createElement("div");
  wrap.className = "animated-card-wrap";
  if (faceDown || !cardId) {
    wrap.classList.add("card-back-large");
    return wrap;
  }
  const card = allCards[cardId] || {};
  const el = renderCard(card, card.cost ?? 0, { show_hand_stats: true });
  wrap.appendChild(el);
  return wrap;
}

function getDrawTargetRect(playerId, targetHandId = null) {
  if (playerId === myPid && targetHandId) {
    for (const el of document.querySelectorAll(".zone-my-hand .card[data-hand-id]")) {
      if (el.dataset.handId === String(targetHandId)) return el.getBoundingClientRect();
    }
  }

  if (playerId !== myPid) {
    const backs = document.querySelectorAll(".zone-opp-hand .card-back");
    if (backs.length) return backs[backs.length - 1].getBoundingClientRect();
  }

  const handEl = playerId === myPid
    ? document.querySelector(".zone-my-hand")
    : document.querySelector(".zone-opp-hand");
  return handEl ? handEl.getBoundingClientRect() : null;
}

function clearArrivingDrawCard(targetHandId) {
  if (!targetHandId) return;
  arrivingDrawHandIds.delete(String(targetHandId));
  for (const el of document.querySelectorAll(".zone-my-hand .card[data-hand-id]")) {
    if (el.dataset.handId === String(targetHandId)) el.classList.remove("draw-arriving");
  }
}

function flyDrawCard(playerId, cardIdRevealed, opts = {}) {
  const duration = opts.duration || EFFECT_DRAW_MS;
  const showcase = !!opts.showcase;
  const targetHandId = opts.targetHandId || null;
  const pileEl = document.querySelector(`.deck-pile[data-pile-owner='${playerId}']`);
  const targetRect = getDrawTargetRect(playerId, targetHandId);
  if (!pileEl || !targetRect) {
    clearArrivingDrawCard(targetHandId);
    return;
  }

  const pr = pileEl.getBoundingClientRect();
  const startX = pr.left + pr.width / 2;
  const startY = pr.top + pr.height / 2;
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const endX = targetRect.left + targetRect.width / 2;
  const endY = targetRect.top + targetRect.height / 2;

  const fly = document.createElement("div");
  fly.className = "draw-fly-v2 start" + (showcase ? " slow" : " quick") + (playerId !== myPid ? " opponent-draw" : "");
  fly.style.left = startX + "px";
  fly.style.top = startY + "px";
  fly.style.setProperty("--draw-duration", `${duration}ms`);

  const isFaceDown = (playerId !== myPid) || !cardIdRevealed;
  fly.appendChild(buildAnimatedCard(cardIdRevealed, isFaceDown));
  document.body.appendChild(fly);

  if (showcase) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fly.classList.remove("start");
      fly.classList.add("showcase");
      fly.style.left = centerX + "px";
      fly.style.top = centerY + "px";
    }));
    setTimeout(() => {
      fly.classList.remove("showcase");
      fly.classList.add("to-hand");
      fly.style.left = endX + "px";
      fly.style.top = endY + "px";
    }, Math.max(900, duration - 700));
  } else {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fly.classList.remove("start");
      fly.classList.add("to-hand");
      fly.style.left = endX + "px";
      fly.style.top = endY + "px";
    }));
  }

  setTimeout(() => {
    fly.classList.add("land");
    clearArrivingDrawCard(targetHandId);
  }, Math.max(250, duration - 180));
  setTimeout(() => {
    fly.remove();
    clearArrivingDrawCard(targetHandId);
  }, duration + 80);
}

// === Animação de queima própria ===
//
// Quando minha carta é queimada por mão cheia, mostra a carta grande no
// centro da tela com efeito de chamas e desaparece. O oponente vê pela
// fila de "anuncia jogada" (com o reveal). Reusa buildAnimatedCard para
// renderizar a carta full-art.
function flyBurnCard(cardId) {
  if (!cardId) return;
  const fly = document.createElement("div");
  fly.className = "burn-showcase";
  fly.style.left = (window.innerWidth / 2) + "px";
  fly.style.top = (window.innerHeight / 2) + "px";
  fly.appendChild(buildAnimatedCard(cardId, false));

  // Camada de chamas sobreposta para reforçar o "queimou".
  const flame = document.createElement("div");
  flame.className = "burn-showcase-flames";
  fly.appendChild(flame);

  document.body.appendChild(fly);
  setTimeout(() => fly.classList.add("burning"), 350);
  setTimeout(() => fly.remove(), 1900);
}

// =================== ANUNCIADOR DE CARTA JOGADA ===================
// Fila simples: cada carta jogada pelo oponente aparece por 2.5s. Se vier várias
// em sequência, vão aparecendo uma por vez, sem atropelar animações.
const OPPONENT_PLAY_ANNOUNCE_MS = 4000;
const opponentPlayQueue = [];
let opponentPlayShowing = false;

function enqueueOpponentPlay(ev) {
  opponentPlayQueue.push(ev);
  if (!opponentPlayShowing) processOpponentPlayQueue();
}

function processOpponentPlayQueue() {
  if (opponentPlayQueue.length === 0) {
    opponentPlayShowing = false;
    return;
  }
  opponentPlayShowing = true;
  const ev = opponentPlayQueue.shift();
  showOpponentPlayCard(ev);
  // próxima entra só depois do tempo completo de exibição
  setTimeout(() => processOpponentPlayQueue(), OPPONENT_PLAY_ANNOUNCE_MS);
}

function buildAnnouncementCard(cardId, extraClass = "") {
  const card = allCards[cardId] || {};
  const cardName = card.name || cardId || "Carta";
  const inner = document.createElement("div");
  inner.className = `card-anim ${extraClass}`.trim();
  const hasImg = !!cardImages[cardId];
  if (hasImg) {
    inner.style.backgroundImage = `url('${cardImages[cardId]}')`;
  } else {
    inner.classList.add("fallback");
    // Importante: card.name e card.text são server-provided e podem conter
    // tags/aspas. Usar textContent (via createElement) evita XSS.
    const nameEl = document.createElement("div");
    nameEl.className = "name-fallback";
    nameEl.textContent = cardName;
    inner.appendChild(nameEl);
    if (card.text) {
      const textEl = document.createElement("div");
      textEl.className = "text-fallback";
      textEl.textContent = card.text;
      inner.appendChild(textEl);
    }
  }
  return inner;
}

function showOpponentPlayCard(ev) {
  const wrap = document.createElement("div");
  wrap.className = "opp-play-announce" + (ev.type === "reveal_pair" ? " pair" : "");

  if (ev.type === "reveal_pair") {
    const pair = document.createElement("div");
    pair.className = "reveal-pair-cards";
    (ev.cards || []).forEach(item => {
      const box = document.createElement("div");
      box.className = "reveal-pair-card";
      box.appendChild(buildAnnouncementCard(item.card_id));
      const owner = document.createElement("div");
      owner.className = "pair-owner-label";
      owner.textContent = item.owner === myPid ? "Seu deck" : "Deck do oponente";
      box.appendChild(owner);
      pair.appendChild(box);
    });
    const label = document.createElement("div");
    label.className = "label pair-label";
    label.textContent = ev.reveal_label || "Cartas reveladas";
    wrap.appendChild(pair);
    wrap.appendChild(label);
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), OPPONENT_PLAY_ANNOUNCE_MS + 150);
    return;
  }

  const cardId = ev.card_id;
  const inner = buildAnnouncementCard(cardId, ev.burned ? "burned" : "");
  const label = document.createElement("div");
  label.className = "label";
  label.textContent = ev.reveal_label || "Oponente jogou";
  inner.appendChild(label);
  wrap.appendChild(inner);
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), OPPONENT_PLAY_ANNOUNCE_MS + 150);
}


function showRevealNotice(ev) {
  const card = allCards[ev.card_id] || {};
  const who = ev.player === myPid ? "Você revelou" : "Oponente revelou";
  const name = card.name || ev.card_id || "Carta";
  toast(`${who}: ${name}`);
  enqueueOpponentPlay({
    type: "reveal",
    player: ev.player,
    card_id: ev.card_id,
    card_name: name,
    reveal_label: ev.player === myPid ? "Você revelou" : "Carta revelada",
  });
}


function queueDyingMinion(minionId, damage = null, delay = 0) {
  const run = () => {
    const el = document.querySelector(`.minion[data-minion-id='${minionId}']`);
    if (!el) return;
    if (damage) {
      spawnDamageBubble(el, damage);
      spawnSpark(el);
    }
    el.classList.add("dying");
    // Detacha um clone do fluxo para a renderização poder remover o lacaio
    // real sem cortar a animação de morte.
    const clone = el.cloneNode(true);
    clone.style.position = "fixed";
    const r = el.getBoundingClientRect();
    clone.style.left = r.left + "px";
    clone.style.top = r.top + "px";
    clone.style.zIndex = 30;
    document.getElementById("fx-layer").appendChild(clone);
    clone.classList.add("dying");
    setTimeout(() => clone.remove(), 600);
  };
  if (delay > 0) setTimeout(run, delay);
  else run();
}

// Adia animações até logo após o re-render (que apaga e recria os DOM nodes)
let pendingAnims = [];
function queueShake(selector, kind, value, delay = 0) {
  pendingAnims.push({ selector, kind, value, delay });
}
function flushPendingAnims() {
  for (const a of pendingAnims) {
    const run = () => {
      const el = document.querySelector(a.selector);
      if (!el) return;
      if (a.kind === "dmg") {
        el.classList.add("taking-damage");
        setTimeout(() => el.classList.remove("taking-damage"), 550);
        if (el.classList.contains("minion")) {
          spawnDamageBubble(el, a.value);
        } else {
          spawnFloatNum(el, "-" + a.value, "damage");
        }
        spawnSpark(el);
      } else if (a.kind === "heal") {
        spawnFloatNum(el, "+" + a.value, "heal");
      } else if (a.kind === "shield") {
        spawnFloatNum(el, a.value, "shield");
      }
    };
    if (a.delay && a.delay > 0) setTimeout(run, a.delay);
    else run();
  }
  pendingAnims = [];
}


function spawnDamageBubble(el, amount) {
  const r = el.getBoundingClientRect();
  const fx = document.getElementById("fx-layer");
  const b = document.createElement("div");
  b.className = "damage-bubble";
  b.textContent = `-${amount}`;
  b.style.left = (r.left + r.width / 2) + "px";
  b.style.top = (r.top + Math.max(8, r.height * 0.18)) + "px";
  fx.appendChild(b);
  setTimeout(() => b.remove(), 1050);
}

function spawnFloatNum(el, txt, kind) {
  const r = el.getBoundingClientRect();
  const fx = document.getElementById("fx-layer");
  const f = document.createElement("div");
  f.className = "float-num " + kind;
  f.textContent = txt;
  f.style.left = (r.left + r.width / 2 - 10) + "px";
  f.style.top = (r.top + r.height / 2 - 14) + "px";
  fx.appendChild(f);
  setTimeout(() => f.remove(), 1100);
}

function spawnSpark(el) {
  const r = el.getBoundingClientRect();
  const fx = document.getElementById("fx-layer");
  const s = document.createElement("div");
  s.className = "spark-burst";
  s.style.left = (r.left + r.width / 2 - 35) + "px";
  s.style.top  = (r.top  + r.height / 2 - 35) + "px";
  fx.appendChild(s);
  setTimeout(() => s.remove(), 460);
}

// Anima o ATAQUE: o atacante caminha até o alvo, tromba nele e volta.
function animateAttack(attackerId, targetId) {
  // Usa o DOM atual (pré-render do dano) para o atacante ir até o alvo antigo.
  setTimeout(() => {
    const atkEl = document.querySelector(`.minion[data-minion-id='${attackerId}']`);
    if (!atkEl) return;
    let tgtEl;
    if (typeof targetId === "string" && targetId.startsWith("hero:")) {
      const pid = targetId.split(":")[1];
      tgtEl = document.querySelector(`.hero[data-hero-owner='${pid}']`);
    } else {
      tgtEl = document.querySelector(`.minion[data-minion-id='${targetId}']`);
    }
    if (!tgtEl) return;

    const ar = atkEl.getBoundingClientRect();
    const tr = tgtEl.getBoundingClientRect();
    const attackerCenter = { x: ar.left + ar.width / 2, y: ar.top + ar.height / 2 };
    const targetCenter = { x: tr.left + tr.width / 2, y: tr.top + tr.height / 2 };
    const dx = targetCenter.x - attackerCenter.x;
    const dy = targetCenter.y - attackerCenter.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const ux = dx / dist;
    const uy = dy / dist;
    const stopGap = Math.min(54, Math.max(28, Math.min(ar.width, tr.width) * 0.34));
    const impactX = dx - ux * stopGap;
    const impactY = dy - uy * stopGap;
    const overX = dx - ux * Math.max(18, stopGap * 0.55);
    const overY = dy - uy * Math.max(18, stopGap * 0.55);
    const recoilX = impactX - ux * 24;
    const recoilY = impactY - uy * 24;
    const lean = Math.max(-8, Math.min(8, dx / 28));

    const fx = document.getElementById("fx-layer");
    const clone = atkEl.cloneNode(true);
    clone.classList.remove("attacking-up", "attacking-down", "attacking-left", "attacking-right", "taking-damage", "entering", "dying");
    clone.classList.add("attack-runner");
    clone.style.position = "fixed";
    clone.style.left = ar.left + "px";
    clone.style.top = ar.top + "px";
    clone.style.width = ar.width + "px";
    clone.style.height = ar.height + "px";
    clone.style.margin = "0";
    clone.style.zIndex = 35;
    clone.style.pointerEvents = "none";
    clone.style.transformOrigin = "50% 58%";
    fx.appendChild(clone);

    atkEl.classList.add("attack-source-hidden");
    tgtEl.classList.add("impact-target");
    const anim = clone.animate([
      { transform: "translate(0, 0) scale(1) rotate(0deg)", offset: 0, easing: "ease-out" },
      { transform: `translate(${impactX * 0.38}px, ${impactY * 0.38}px) scale(1.03) rotate(${lean}deg)`, offset: 0.34 },
      { transform: `translate(${impactX * 0.72}px, ${impactY * 0.72}px) scale(1.06) rotate(${-lean * 0.8}deg)`, offset: 0.56 },
      { transform: `translate(${overX}px, ${overY}px) scale(1.12) rotate(${lean * 0.45}deg)`, offset: 0.72, easing: "cubic-bezier(.16,.9,.24,1.25)" },
      { transform: `translate(${recoilX}px, ${recoilY}px) scale(0.98) rotate(${-lean * 0.25}deg)`, offset: 0.82, easing: "ease-out" },
      { transform: "translate(0, 0) scale(1) rotate(0deg)", offset: 1, easing: "ease-in" },
    ], { duration: ATTACK_ANIMATION_MS, iterations: 1, fill: "forwards" });

    setTimeout(() => spawnImpactRing(tgtEl), ATTACK_IMPACT_MS);
    anim.onfinish = () => {
      clone.remove();
      atkEl.classList.remove("attack-source-hidden");
      tgtEl.classList.remove("impact-target");
    };
    setTimeout(() => {
      clone.remove();
      atkEl.classList.remove("attack-source-hidden");
      tgtEl.classList.remove("impact-target");
    }, ATTACK_STATE_RENDER_DELAY_MS + 30);
  }, 30);
}

function spawnImpactRing(el) {
  const r = el.getBoundingClientRect();
  const fx = document.getElementById("fx-layer");
  const ring = document.createElement("div");
  ring.className = "impact-ring";
  ring.style.left = (r.left + r.width / 2 - 45) + "px";
  ring.style.top = (r.top + r.height / 2 - 45) + "px";
  fx.appendChild(ring);
  setTimeout(() => ring.remove(), 360);
}

// Após cada render, dispara animações pendentes
const originalRender = render;
render = function() {
  originalRender();
  // RAF garante que o DOM já foi pintado
  requestAnimationFrame(() => flushPendingAnims());
};

// Heurísticas para agregar eventos relacionados em um único item visual.
// Ex: play_card + summon imediatamente em seguida = uma só entrada.
function buildLogItems(events) {
  let items = [];
  const seenSeq = new Set();
  for (let i = 0; i < events.length; i++) {
    const ev = events[i];
    if (ev.seq !== undefined && seenSeq.has(ev.seq)) continue;
    const item = makeLogItem(ev, events, i);
    if (!item) continue;
    item.sourceSeq = ev.seq;
    if (item.consumedSeqs) {
      for (const s of item.consumedSeqs) seenSeq.add(s);
      items = items.filter(existing => !item.consumedSeqs.includes(existing.sourceSeq));
    }
    if (ev.seq !== undefined) seenSeq.add(ev.seq);
    items.push(item);
  }
  // Mais recentes primeiro, limita pra não poluir.
  return items.slice(-LOG_MAX_ITEMS).reverse();
}

const LOG_MAJOR_TYPES = new Set(["game_start", "turn_start", "game_end", "concede", "play_card", "attack"]);
const LOG_DETAIL_TYPES = new Set([
  "summon", "summon_token", "summon_copy", "resummon",
  "damage", "damage_prevented", "damage_reduced", "divine_shield_break",
  "heal", "death", "death_replaced_shuffle_into_deck", "poison_kill",
  "draw", "draw_from_choice", "draw_minion", "draw_spell", "draw_card_type",
  "draw_minion_from_deck", "draw_card_from_deck_filtered", "draw_highest_revealed",
  "draw_lowest_cost_minion", "draw_minion_with_tag", "draw_repeat", "draw_playable_card",
  "discard", "discard_from_deck_choice", "discard_lowest_revealed",
  "burn", "burn_delayed_draw", "burn_returned_minion", "burn_stolen",
  "return_to_hand", "return_to_hand_burned", "return_to_hand_modify_cost",
  "reveal_top_card", "reveal_top_each_deck", "reveal_and_steal_top_deck_cards", "reveal_drawn_card", "reveal_hand_card", "reveal_hand_edges",
  "silence", "freeze", "freeze_hero",
]);

function eventSeq(ev) { return ev && ev.seq !== undefined ? ev.seq : null; }
function markConsumed(consumed, ev) {
  const seq = eventSeq(ev);
  if (seq !== null) consumed.push(seq);
}
function cardName(cardId, fallback = "Carta") {
  return cardId ? (allCards[cardId]?.name || cardId) : fallback;
}
function shortLogName(name, fallback = "?") {
  const raw = String(name || fallback).trim();
  if (!raw) return fallback;
  const words = raw.split(/\s+/).filter(Boolean);
  if (words.length === 1) return words[0].slice(0, 10);
  const useful = words.filter(w => !/^(de|da|do|dos|das|e)$/i.test(w));
  return (useful.length ? useful : words).slice(0, 2).map(w => w[0].toUpperCase()).join("");
}
function heroLabel(pid) { return `Herói de ${playerName(Number(pid))}`; }

function logContext(events, idx) {
  const minions = new Map();
  for (let i = 0; i <= idx; i++) {
    const ev = events[i];
    if (!ev) continue;
    if ((ev.type === "summon" || ev.type === "summon_token") && ev.minion?.instance_id) {
      minions.set(ev.minion.instance_id, { ...ev.minion, owner: ev.owner });
    }
    if (ev.type === "play_card" && ev.card_id && ev.card_name) {
      // Ajuda cardName mesmo quando allCards ainda não terminou de carregar.
      if (!allCards[ev.card_id]) allCards[ev.card_id] = { id: ev.card_id, name: ev.card_name };
    }
  }
  return { minions };
}

function minionFromContext(ctx, id) {
  if (!id) return null;
  const boardMinion = [
    ...((state?.you && state.you.board) || []),
    ...((state?.opponent && state.opponent.board) || []),
  ].find(m => m.instance_id === id);
  return boardMinion || ctx.minions.get(id) || null;
}

function targetNameFromEvent(ev, ctx) {
  const id = ev.target || ev.target_id || ev.minion;
  if (ev.target_kind === "hero") return heroLabel(ev.target_id);
  if (String(id || "").startsWith("hero:")) return heroLabel(String(id).split(":")[1]);
  const minion = minionFromContext(ctx, id);
  return ev.target_name || ev.name || minion?.name || id || "alvo";
}

function cardFromEvent(ev, ctx) {
  if (!ev) return null;
  const type = String(ev.type || "");
  const owner = ev.player ?? ev.owner;
  if ((type.startsWith("draw") || type.startsWith("discard") || type.startsWith("burn")) && owner !== myPid) {
    return null;
  }
  if (ev.card_id) return ev.card_id;
  if (ev.target_card_id) return ev.target_card_id;
  if (ev.minion?.card_id) return ev.minion.card_id;
  const minion = minionFromContext(ctx, ev.minion || ev.target_id || ev.target);
  return minion?.card_id || null;
}

function detailForEvent(ev, ctx, sourceName = null) {
  if (!ev) return null;
  if (ev.type === "summon" || ev.type === "summon_token") {
    const m = ev.minion || {};
    const stats = m.attack !== undefined && m.health !== undefined ? ` (${m.attack}/${m.health})` : "";
    return `${playerName(ev.owner)} evocou ${m.name || "um lacaio"}${stats}.`;
  }
  if (ev.type === "summon_copy") return `Evocou uma cópia${ev.copies ? ` (${ev.copies}x)` : ""}.`;
  if (ev.type === "resummon") return `Reevocou ${cardName(ev.card_id, "um lacaio")}.`;
  if (ev.type === "damage") {
    const target = targetNameFromEvent(ev, ctx);
    const armor = ev.armor_absorbed ? ` (${ev.armor_absorbed} absorvido por armadura)` : "";
    const src = ev.source_name || sourceName;
    return `${target} sofreu ${ev.amount} de dano${src ? ` por ${src}` : ""}${armor}.`;
  }
  if (ev.type === "damage_prevented") return `Dano prevenido em ${targetNameFromEvent(ev, ctx)}${ev.reason ? ` (${ev.reason})` : ""}.`;
  if (ev.type === "damage_reduced") return `Dano reduzido em ${targetNameFromEvent(ev, ctx)}: ${ev.source_amount} → ${ev.final_amount}.`;
  if (ev.type === "divine_shield_break") return `Escudo Divino quebrado em ${targetNameFromEvent(ev, ctx)}.`;
  if (ev.type === "heal") return `${targetNameFromEvent(ev, ctx)} curou ${ev.amount}.`;
  if (ev.type === "death") return `${targetNameFromEvent(ev, ctx)} morreu${ev.owner !== undefined ? ` (${playerName(ev.owner)})` : ""}.`;
  if (ev.type === "death_replaced_shuffle_into_deck") return `${cardName(ev.card_id, targetNameFromEvent(ev, ctx))} morreria, mas voltou ao deck.`;
  if (ev.type === "poison_kill") return `${targetNameFromEvent(ev, ctx)} foi destruído por Venenoso.`;
  if (String(ev.type).startsWith("draw")) {
    const isMine = ev.player === myPid;
    const drawn = isMine ? cardName(ev.card_id, "uma carta") : "uma carta do baralho";
    return `${playerName(ev.player)} comprou ${drawn}${sourceName ? ` por ${sourceName}` : ""}.`;
  }
  if (String(ev.type).startsWith("reveal")) {
    if (ev.type === "reveal_top_each_deck") {
      const cards = (ev.cards || []).map(c => `${playerName(c.owner)}: ${cardName(c.card_id, c.card_id)}`).join("; ");
      return `Revelou o topo dos decks${cards ? ` (${cards})` : ""}${sourceName ? ` por ${sourceName}` : ""}.`;
    }
    if (ev.type === "reveal_hand_edges") {
      const cards = (ev.cards || []).map(c => cardName(c.card_id, c.card_id)).join(" e ");
      return `${playerName(ev.player)} revelou ${cards || "cartas da mão"}${sourceName ? ` por ${sourceName}` : ""}.`;
    }
    if (ev.type === "reveal_and_steal_top_deck_cards") {
      const ids = ev.card_ids || (ev.cards || []).map(c => c.card_id);
      const cards = ids.map(cid => cardName(cid, cid)).join(", ");
      return `${playerName(ev.player)} revelou e colocou no topo do próprio deck ${cards || "cartas do deck do oponente"}${sourceName ? ` por ${sourceName}` : ""}.`;
    }
    return `${playerName(ev.player)} revelou ${cardName(ev.card_id, "uma carta")}${sourceName ? ` por ${sourceName}` : ""}.`;
  }
  if (String(ev.type).startsWith("burn")) {
    const owner = ev.player ?? ev.owner;
    const isMine = owner === myPid;
    const burned = isMine ? cardName(ev.card_id, "uma carta") : "uma carta";
    return `${owner !== undefined ? playerName(owner) : "Um jogador"} queimou ${burned}${sourceName ? ` por ${sourceName}` : ""}.`;
  }
  if (String(ev.type).startsWith("discard")) {
    const isMine = ev.player === myPid;
    const discarded = isMine ? cardName(ev.card_id, "uma carta") : "uma carta";
    return `${playerName(ev.player)} descartou ${discarded}.`;
  }
  if (String(ev.type).startsWith("return_to_hand")) return `${targetNameFromEvent(ev, ctx)} voltou para a mão.`;
  if (ev.type === "silence") return `${targetNameFromEvent(ev, ctx)} foi silenciado.`;
  if (ev.type === "freeze") return `${targetNameFromEvent(ev, ctx)} foi congelado.`;
  if (ev.type === "freeze_hero") return `${heroLabel(ev.player)} foi congelado.`;
  return null;
}

function collectForwardDetails(all, idx, consumed, ctx, sourceName) {
  const details = [];
  for (let j = idx + 1; j < all.length && details.length < 10; j++) {
    const ev = all[j];
    if (LOG_MAJOR_TYPES.has(ev.type)) break;
    if (!LOG_DETAIL_TYPES.has(ev.type)) continue;
    const detail = detailForEvent(ev, ctx, sourceName);
    if (!detail) continue;
    details.push(detail);
    markConsumed(consumed, ev);
  }
  return details;
}

function collectAttackDetails(ev, all, idx, consumed, ctx) {
  const attacker = minionFromContext(ctx, ev.attacker);
  const targetId = ev.target;
  const target = minionFromContext(ctx, targetId);
  const attackerName = attacker?.name || ev.attacker || "Atacante";
  const targetName = String(targetId || "").startsWith("hero:") ? heroLabel(String(targetId).split(":")[1]) : (target?.name || targetId || "alvo");
  const related = new Set([ev.attacker, targetId].filter(Boolean));
  const details = [`${attackerName} atacou ${targetName}.`];

  const prev = [];
  for (let j = idx - 1; j >= 0 && prev.length < 4; j--) {
    const e = all[j];
    if (LOG_MAJOR_TYPES.has(e.type)) break;
    const id = e.target_id || e.minion;
    if ((e.type === "damage" || e.type === "divine_shield_break" || e.type === "damage_prevented") && related.has(id)) {
      prev.unshift(e);
      markConsumed(consumed, e);
    }
  }
  for (const e of prev) details.push(detailForEvent(e, ctx, e.target_id === ev.attacker ? targetName : attackerName));

  for (let j = idx + 1; j < all.length && details.length < 12; j++) {
    const e = all[j];
    if (LOG_MAJOR_TYPES.has(e.type)) break;
    const id = e.target_id || e.minion;
    if (!related.has(id) && !LOG_DETAIL_TYPES.has(e.type)) continue;
    const detail = detailForEvent(e, ctx, attackerName);
    if (!detail) continue;
    details.push(detail);
    markConsumed(consumed, e);
  }
  return { attackerName, targetName, details };
}

function makeLogItem(ev, all, idx) {
  const playerLabel = ev.player !== undefined ? playerName(ev.player) : "";
  const consumed = [];
  const ctx = logContext(all, idx);
  switch (ev.type) {
    case "game_start":
      return { kind: "game", icon: "✦", title: "Início da partida",
               text: `Começa: ${playerName(ev.first_player)}` };
    case "turn_start":
      return { kind: "turn", icon: `T${ev.turn}`, title: `Turno ${ev.turn}`,
               text: `Vez de ${playerName(ev.player)}` };
    case "play_card": {
      const cardTitle = ev.card_name || cardName(ev.card_id, "Carta");
      const details = [`${playerLabel} jogou ${cardTitle}.`, `Custo pago: ${ev.cost ?? "?"}.`];
      if (ev.empowered) details.push("Foi jogada fortalecida.");
      if (ev.combo_active) details.push("Combo estava ativo.");
      details.push(...collectForwardDetails(all, idx, consumed, ctx, cardTitle));
      return {
        kind: "play",
        cardId: ev.card_id,
        label: shortLogName(cardTitle, "Jogar"),
        title: `${playerLabel} jogou ${cardTitle}`,
        text: details.join("\n"),
        details,
        consumedSeqs: consumed,
      };
    }
    case "summon":
    case "summon_token": {
      const cardId = ev.minion && ev.minion.card_id;
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return {
        kind: "summon",
        cardId,
        label: shortLogName(ev.minion?.name, "Evoc"),
        title: `${playerName(ev.owner)} evocou ${ev.minion?.name || "?"}`,
        text: details.join("\n"),
        details,
      };
    }
    case "attack": {
      const grouped = collectAttackDetails(ev, all, idx, consumed, ctx);
      return { kind: "attack",
               cardId: minionFromContext(ctx, ev.attacker)?.card_id,
               label: `${shortLogName(grouped.attackerName)}→${shortLogName(grouped.targetName)}`,
               title: `${grouped.attackerName} atacou ${grouped.targetName}`,
               text: grouped.details.join("\n"),
               details: grouped.details,
               consumedSeqs: consumed };
    }
    case "damage": {
      const targetName = targetNameFromEvent(ev, ctx);
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "damage", badge: `-${ev.amount}`,
               cardId: cardFromEvent(ev, ctx),
               label: `${shortLogName(targetName)} -${ev.amount}`,
               title: "Dano", text: details.join("\n"), details };
    }
    case "heal": {
      const targetName = targetNameFromEvent(ev, ctx);
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "heal", badge: `+${ev.amount}`,
               cardId: cardFromEvent(ev, ctx),
               label: `${shortLogName(targetName)} +${ev.amount}`,
               title: "Cura", text: details.join("\n"), details };
    }
    case "death": {
      const targetName = targetNameFromEvent(ev, ctx);
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "death", cardId: cardFromEvent(ev, ctx),
               label: `☠ ${shortLogName(targetName)}`,
               title: `${targetName} morreu`, text: details.join("\n"), details };
    }
    case "draw": {
      const isMine = ev.player === myPid;
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "draw", cardId: isMine ? ev.card_id : null,
               title: `${playerLabel} comprou`, text: details.join("\n"), details };
    }
    case "fatigue":
      return { kind: "fatigue",
               title: `${playerLabel} - Fadiga`,
               text: `${ev.amount} de dano` };
    case "discard": {
      const isMine = ev.player === myPid;
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "discard", cardId: isMine ? ev.card_id : null,
               title: `${playerLabel} descartou`, text: details.join("\n"), details };
    }
    case "burn": {
      const cardId = cardFromEvent(ev, ctx);
      const details = [detailForEvent(ev, ctx)].filter(Boolean);
      return { kind: "burn", cardId,
               title: "Carta queimada", text: details.join("\n"), details };
    }
    case "divine_shield_break":
      return { kind: "shield", title: "Escudo Divino quebrado", text: detailForEvent(ev, ctx) || "" };
    case "silence":
      return { kind: "silence", title: "Silenciado", text: detailForEvent(ev, ctx) || "" };
    case "freeze":
      return { kind: "freeze", title: "Congelado", text: detailForEvent(ev, ctx) || "" };
    case "concede":
      return { kind: "concede", title: `${playerLabel} se rendeu`, text: "" };
    case "no_targets_available":
      return { kind: "info", title: ev.card_name || "Carta", text: "Sem alvos válidos" };
    case "game_end":
      return { kind: "game", title: "Fim de partida", text: `Vencedor: ${ev.winner === -1 ? "Empate" : playerName(ev.winner)}` };
    case "unimplemented_action":
      return { kind: "info", title: "Efeito não implementado", text: ev.action || "" };
    default: {
      if (!LOG_DETAIL_TYPES.has(ev.type)) return null;
      const detail = detailForEvent(ev, ctx);
      if (!detail) return null;
      const prefix = String(ev.type || "").split("_")[0];
      const kind = LOG_SVGS[prefix] ? prefix : "info";
      return { kind, cardId: cardFromEvent(ev, ctx), title: detail.replace(/\.$/, ""), text: detail, details: [detail] };
    }
  }
}

function playerName(pid) {
  if (pid === myPid) return state?.you?.name || "Você";
  if (pid === 1 - myPid) return state?.opponent?.name || "Oponente";
  return `P${pid}`;
}

function renderLog() {
  const box = document.getElementById("log-overlay");
  box.innerHTML = "";
  const events = state.log || [];
  const items = buildLogItems(events);
  for (const item of items) {
    box.appendChild(buildLogIcon(item));
  }
}

function buildLogIcon(item) {
  const wrap = document.createElement("div");
  wrap.className = `log-icon log-icon-${item.kind}`;

  const inner = document.createElement("div");
  inner.className = "log-icon-inner";
  const cardImg = item.cardId ? cardImages[item.cardId] : null;
  if (cardImg) {
    inner.classList.add("art");
    inner.style.backgroundImage = `url("${encodeURI(cardImg)}")`;
  } else if (LOG_SVGS[item.kind]) {
    inner.classList.add("svg");
    inner.innerHTML = LOG_SVGS[item.kind];
  } else {
    inner.classList.add("glyph");
    inner.textContent = item.icon || "•";
  }
  // Badge sobreposto ao ícone:
  //   - dano/cura → "-3" / "+2" (item.badge)
  //   - turno     → "T7"        (item.icon, p/ não duplicar com o SVG do relógio)
  const badgeText = item.badge || (item.kind === "turn" ? item.icon : null);
  if (!cardImg && badgeText) {
    const badge = document.createElement("span");
    badge.className = "log-icon-badge";
    badge.textContent = badgeText;
    inner.appendChild(badge);
    inner.classList.add("with-badge");
  }
  wrap.appendChild(inner);

  if (item.label) {
    const label = document.createElement("div");
    label.className = "log-icon-label";
    label.textContent = item.label;
    wrap.appendChild(label);
  }

  const tip = document.createElement("div");
  tip.className = "log-tooltip";
  const t1 = document.createElement("div");
  t1.className = "tip-title";
  t1.textContent = item.title || "";
  tip.appendChild(t1);
  const detailLines = Array.isArray(item.details) && item.details.length
    ? item.details
    : (item.text ? [item.text] : []);
  if (detailLines.length) {
    const details = document.createElement("div");
    details.className = "tip-details";
    for (const lineText of detailLines) {
      const line = document.createElement("div");
      line.className = "tip-detail-line";
      line.textContent = lineText;
      details.appendChild(line);
    }
    tip.appendChild(details);
  }
  // Para entradas com cardId, embute uma miniatura grande no tooltip.
  if (item.cardId && cardImages[item.cardId]) {
    const big = document.createElement("div");
    big.className = "tip-card-art";
    big.style.backgroundImage = `url("${encodeURI(cardImages[item.cardId])}")`;
    tip.appendChild(big);
  }
  wrap.appendChild(tip);

  return wrap;
}

// ============ End overlay ============
function renderEndOverlay() {
  const root = document.getElementById("overlay-root");
  root.innerHTML = "";
  const win = state.winner;
  let msg = "Empate";
  if (win === myPid) msg = "Vitória";
  else if (win === 1 - myPid) msg = "Derrota";
  const ov = document.createElement("div");
  ov.className = "modal-bg";
  ov.innerHTML = `
    <div class="modal" style="text-align: center;">
      <h1 style="font-size: 3rem;">${msg}</h1>
      <div class="muted">Partida encerrada.</div>
      <div class="sep"></div>
      <button class="btn primary" onclick="window.location.href='/lobby'">Voltar ao Saguão</button>
    </div>
  `;
  root.appendChild(ov);
}

// ============ Init ============
Promise.all([loadCards(), loadCardImages()])
  .then(preloadAllAssets)
  .then(connect)
  .catch((err) => {
    console.error("Erro ao inicializar partida:", err);
    const overlay = document.getElementById("asset-loading-overlay");
    if (overlay) overlay.remove();
    toast("Erro ao carregar a partida. Recarregue a página.");
  });
</script>
