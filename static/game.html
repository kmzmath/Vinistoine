<script>
const token = localStorage.getItem("auth_token");
if (!token) window.location.href = "/";
const params = new URLSearchParams(window.location.search);
const matchId = params.get("match");
if (!matchId) window.location.href = "/lobby";

let allCards = {};
let cardImages = {};   // card_id -> url
let heroImages = {};   // username (lower) -> url
let state = null;
let prevState = null;  // pra detectar deltas e animar
let myPid = null;
let ws = null;
let mulliganSelections = new Set();
let targetingMode = null;  // { hand_id, card }
let attackingMode = null;  // { attacker_id }
let abilityMode = null;    // { minion_id, effect, ability_index }
let mousePos = { x: 0, y: 0 };
let hoverPreviewTimer = null;
let hoverPreviewLastEvent = null;
// Drag & drop de lacaios da mão para o campo. Quando o jogador segura um
// minion-card, dragState fica populado e o board mostra um indicador de
// posição entre os lacaios.
let dragState = null;
let pendingStateRenderTimer = null;
let stateRenderVersion = 0;

const ATTACK_ANIMATION_MS = 760;
const ATTACK_STATE_RENDER_DELAY_MS = 820;
const ATTACK_IMPACT_MS = 500;

function scheduleStateRender(delay = 0) {
  if (myPid === null) return;
  stateRenderVersion += 1;
  const version = stateRenderVersion;
  if (pendingStateRenderTimer) {
    clearTimeout(pendingStateRenderTimer);
    pendingStateRenderTimer = null;
  }
  const run = () => {
    if (version !== stateRenderVersion) return;
    pendingStateRenderTimer = null;
    render();
  };
  if (delay > 0) pendingStateRenderTimer = setTimeout(run, delay);
  else run();
}

// =========== Network ===========
async function loadCards() {
  const r = await fetch("/api/cards?include_tokens=1");
  const list = await r.json();
  for (const c of list) allCards[c.id] = c;
}
async function loadCardImages() {
  try {
    const r = await fetch("/api/card-images");
    const data = await r.json();
    cardImages = data.cards || {};
    heroImages = data.heroes || {};
  } catch (e) {
    console.warn("Não foi possível carregar lista de imagens:", e);
  }
}

function updateAssetProgress(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 100;
  const fill = document.getElementById("asset-progress-fill");
  const count = document.getElementById("asset-loading-count");
  const text = document.getElementById("asset-loading-text");
  if (fill) fill.style.width = `${pct}%`;
  if (count) count.textContent = `${pct}%`;
  if (text) text.textContent = total ? `Carregando ${done}/${total} imagens...` : "Nenhuma imagem para carregar.";
}

function preloadImage(url) {
  return new Promise((resolve) => {
    const img = new Image();
    let done = false;
    const finish = (ok) => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      resolve(ok);
    };
    const timer = setTimeout(() => finish(false), 7000);
    img.onload = () => finish(true);
    img.onerror = () => finish(false);
    img.src = url;
  });
}

async function preloadAllAssets() {
  try {
    const urls = [...Object.values(cardImages || {}), ...Object.values(heroImages || {})];
    // Sem URLs (ex: API de imagens falhou) não devemos travar em 0% nem
    // mostrar "NaN%": vai direto para 100%.
    if (!urls.length) {
      updateAssetProgress(1, 1);
      return;
    }
    let done = 0;
    updateAssetProgress(0, urls.length);
    await Promise.all(urls.map(async (url) => {
      await preloadImage(url);
      done++;
      updateAssetProgress(done, urls.length);
    }));
  } catch (e) {
    console.warn("Falha ao pré-carregar imagens:", e);
  } finally {
    updateAssetProgress(1, 1);
    const overlay = document.getElementById("asset-loading-overlay");
    if (overlay) {
      overlay.classList.add("hidden");
      setTimeout(() => overlay.remove(), 250);
    }
  }
}

function connect() {
  const proto = window.location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${window.location.host}/ws/match/${matchId}?token=${encodeURIComponent(token)}`);
  ws.onmessage = (ev) => {
    let msg;
    try {
      msg = JSON.parse(ev.data);
    } catch (err) {
      console.error("WS payload inválido:", err, ev.data);
      return;
    }
    if (!msg || typeof msg !== "object") return;
    if (msg.type === "joined") {
      myPid = msg.your_player_id;
      syncSurrenderAvailability();
      // Se o primeiro state chegou ANTES de joined, agora finalmente sabemos
      // quem somos - re-renderiza com a perspectiva certa
      if (state) render();
    }
    if (msg.type === "state") {
      const newState = msg.state;
      // Detecta mudanças e dispara animações ANTES de atualizar prevState.
      // Importante: só anima se já sabemos quem somos (myPid !== null).
      // Caso contrário guardamos como "primeira foto" do estado, sem animação.
      const renderDelay = (state && myPid !== null) ? animateFromDelta(state, newState) : 0;
      prevState = state;
      state = newState;
      syncSurrenderAvailability();
      if (newState.phase === "MULLIGAN") onMulliganStateUpdate(newState);
      // Só renderiza se já temos myPid (caso contrário esperamos joined chegar).
      // Em ataques, renderizar só depois da corrida evita HP/morte antes da colisão.
      if (myPid !== null) scheduleStateRender(renderDelay);
    }
    if (msg.type === "error") toast(msg.message || msg.msg);
    if (msg.type === "opponent_disconnected") toast("Oponente desconectou");
  };
  ws.onclose = () => toast("Conexão encerrada");
}

function send(action, data = {}) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    toast("Conexão indisponível");
    return;
  }
  try {
    ws.send(JSON.stringify({ action, ...data }));
  } catch (err) {
    console.warn("Falha ao enviar ao servidor:", err);
    toast("Conexão indisponível");
  }
}

function isSurrenderAvailable() {
  return Boolean(state && myPid !== null && state.phase !== "ENDED");
}

function syncSurrenderAvailability() {
  const available = isSurrenderAvailable();
  window.__vinistoneSurrenderAvailable = available;
  if (typeof window.setAudioSurrenderAvailable === "function") {
    window.setAudioSurrenderAvailable(available);
  }
  window.dispatchEvent(new CustomEvent("audio-surrender-availability", {
    detail: { available },
  }));
}

// Exposto para o painel de configurações flutuante (audio.js) chamar
// quando o jogador clicar em "Render-se" lá. Mesmo fluxo do botão antigo.
window.requestSurrender = function () {
  if (!isSurrenderAvailable()) return;
  if (confirm("Tem certeza que deseja se render?")) send("concede");
};
window.addEventListener("audio-surrender-request", () => window.requestSurrender());

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

// === Fit da arena no viewport ===
//
// A arena tem tamanho lógico fixo (ARENA_W x ARENA_H) e é escalada
// uniformemente para caber em qualquer tela / nível de zoom do navegador.
// Isso elimina a sensação de "layout muda dependendo do meu setup":
// jogadores em monitores diferentes, com zoom diferente, veem exatamente
// a mesma proporção. O scale é aplicado via transform na .arena-layout.
const ARENA_W = 1800;
const ARENA_H = 1000;
let arenaScale = 1;

function fitArenaToViewport() {
  const arena = document.querySelector(".arena-layout");
  if (!arena) return;
  // Margem para não encostar nos cantos (deixa um respiro decorativo).
  const padX = 12;
  const padY = 12;
  // Usa o tamanho externo real da arena (incluindo a moldura/borda). Antes o
  // scale era calculado só pelo canvas lógico 1800x1000; como a borda de 14px
  // fica fora desse tamanho em CSS, a parte de baixo podia ser cortada pelo
  // overflow do viewport justamente na área da mão do jogador.
  const outerW = arena.offsetWidth || ARENA_W;
  const outerH = arena.offsetHeight || ARENA_H;
  const sx = (window.innerWidth - padX * 2) / outerW;
  const sy = (window.innerHeight - padY * 2) / outerH;
  arenaScale = Math.min(sx, sy, 1.6); // não passa de 1.6 em telas gigantes
  arena.style.transform = `scale(${arenaScale})`;
  document.body.style.setProperty("--arena-scale", String(arenaScale));
}

window.addEventListener("resize", fitArenaToViewport);
// Mantém o scale correto também ao mudar zoom/devicePixelRatio.
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", fitArenaToViewport);
}

// =========== Render principal ===========
function render() {
  // Fecha qualquer preview de hover ativo: o DOM que dispararia o mouseleave
  // será destruído neste render, e sem o mouseleave o preview ficaria órfão
  // (lacaio morto, troca de tela, etc.). Cancela também o timer de delay.
  clearTimeout(hoverPreviewTimer);
  hoverPreviewTimer = null;
  hideMinionCardPreview();

  const root = document.getElementById("board-root");
  if (!state) {
    root.innerHTML = `<div style="margin: auto; text-align: center;">
      <h2>Aguardando oponente entrar...</h2>
      <div class="faint">Compartilhe o código da sala para que um amigo entre.</div>
    </div>`;
    return;
  }
  if (state.phase === "MULLIGAN") { renderMulligan(); fitArenaToViewport(); return; }
  renderBoard();
  renderLog();
  renderPendingChoiceOverlay();
  if (state.phase === "ENDED") renderEndOverlay();
  fitArenaToViewport();
}

// Snapshot da mão usado pra detectar cartas novas chegando após confirmar
let mulliganOldHandIds = null;  // Set de instance_ids antes do swap
let mulliganConfirming = false;

function renderMulligan() {
  const root = document.getElementById("board-root");
  root.innerHTML = "";

  const myDone = (state.mulligan_done || [])[myPid] === true;
  const oppDone = (state.mulligan_done || [])[1 - myPid] === true;

  const overlay = document.createElement("div");
  overlay.className = "mulligan-overlay" + (myDone ? " confirmed" : "");

  let headerHtml;
  if (myDone) {
    headerHtml = `
      <h2 style="color: var(--gold-bright);">Cartas confirmadas</h2>
      <div class="muted">Aguarde o oponente terminar a troca de cartas.</div>`;
  } else {
    headerHtml = `
      <h2>Selecione cartas para descartar</h2>
      <div class="muted">Clique nas cartas que NÃO quer manter. Elas voltam ao baralho e você compra novas.</div>`;
  }

  overlay.innerHTML = `
    ${headerHtml}
    <div class="mulligan-cards" id="mull-cards"></div>
    <div id="mull-action"></div>
  `;
  root.appendChild(overlay);

  const handBox = document.getElementById("mull-cards");
  for (const c of state.you.hand) {
    const card = allCards[c.card_id];
    if (!card) continue;
    const el = renderCard(card, c.effective_cost ?? c.cost_override, {
      echo_temporary: c.echo_temporary,
      effective_attack: c.effective_attack,
      effective_health: c.effective_health,
      stats_modified: c.stats_modified,
      cost_modified: c.cost_modified,
      show_hand_stats: true,
    });
    if (mulliganSelections.has(c.instance_id)) el.classList.add("selected");
    if (!myDone) {
      el.onclick = () => {
        if (mulliganSelections.has(c.instance_id)) mulliganSelections.delete(c.instance_id);
        else mulliganSelections.add(c.instance_id);
        renderMulligan();
      };
    }
    // Se essa carta é "nova" (chegou após o swap), entra com animação
    if (myDone && mulliganOldHandIds && !mulliganOldHandIds.has(c.instance_id)) {
      el.classList.add("flying-in");
    }
    handBox.appendChild(el);
  }

  const actionBox = document.getElementById("mull-action");
  if (myDone) {
    if (!oppDone) {
      actionBox.innerHTML = `
        <div class="waiting-overlay">
          <div style="font-family: 'Cinzel'; letter-spacing: 0.18em; color: var(--gold-bright);">
            Aguardando oponente
          </div>
          <div class="pulse-dots"><span></span><span></span><span></span></div>
        </div>
      `;
    } else {
      actionBox.innerHTML = `<div class="muted" style="font-family: Cinzel; letter-spacing: 0.15em;">Iniciando partida...</div>`;
    }
  } else {
    actionBox.innerHTML = `<button class="btn primary" id="mull-confirm">Confirmar</button>`;
    document.getElementById("mull-confirm").onclick = () => doConfirmMulligan();
  }
}

function doConfirmMulligan() {
  // Snapshot dos IDs ATUAIS - depois do swap, os instance_ids das cartas
  // trocadas mudam, então comparar com este set identifica as "novas".
  mulliganOldHandIds = new Set(state.you.hand.map(c => c.instance_id));
  mulliganConfirming = true;

  const btn = document.getElementById("mull-confirm");
  if (btn) btn.disabled = true;

  const swapList = Array.from(mulliganSelections);
  const cardsEls = Array.from(document.querySelectorAll("#mull-cards .card"));
  const handIds = state.you.hand.map(c => c.instance_id);

  // Anima as cartas selecionadas saindo (voando pro baralho)
  cardsEls.forEach((el, i) => {
    if (swapList.includes(handIds[i])) el.classList.add("flying-out");
  });

  // Aguarda a animação de saída antes de mandar pro servidor
  setTimeout(() => {
    send("mulligan", { swap: swapList });
    mulliganSelections = new Set();
  }, 580);
}

// Chamada quando recebemos novo estado durante MULLIGAN -
// usa mulliganOldHandIds pra que renderMulligan saiba quais cartas
// devem entrar com animação flying-in
function onMulliganStateUpdate(newState) {
  // se temos snapshot de IDs antigos, mantemos pra renderMulligan usar
  // até a próxima atualização (quando ambos confirmam, sai do MULLIGAN)
  if (mulliganConfirming) {
    mulliganConfirming = false;
    // mulliganOldHandIds permanece - renderMulligan vai detectar cartas novas
  }
}

// ====== CARD na mão ======
function renderCard(card, costOverride, opts = {}) {
  const div = document.createElement("div");
  const hasImg = !!cardImages[card.id];
  const isEchoTemp = !!opts.echo_temporary;

  // Se a carta tem imagem, renderizamos full-art. Na mão, colocamos
  // pequenos overlays com os valores atuais para cartas modificadas/temporárias.
  if (hasImg) {
    div.className = "card full-art " + (card.type === "SPELL" ? "spell" : "minion");
    div.style.backgroundImage = `url('${cardImages[card.id]}')`;
    if (isEchoTemp) div.classList.add("echo-temporary");

    if (opts.show_hand_stats) {
      const cost = costOverride ?? card.cost ?? 0;
      const atk = opts.effective_attack ?? card.attack;
      const hp = opts.effective_health ?? card.health;
      const costModified = !!(opts.cost_modified || isEchoTemp || cost !== (card.cost ?? 0));
      const atkModified = !!(opts.stats_modified || (card.type === "MINION" && atk !== (card.attack ?? 0)));
      const hpModified = !!(opts.stats_modified || (card.type === "MINION" && hp !== (card.health ?? 0)));
      const modified = !!(costModified || atkModified || hpModified || isEchoTemp);
      const overlay = document.createElement("div");
      overlay.className = "hand-stat-overlay";
      overlay.innerHTML = `
        <div class="hand-cost${costModified ? " modified" : ""}">${cost}</div>
        ${card.type === "MINION" ? `<div class="hand-atk${atkModified ? " modified" : ""}">${atk ?? 0}</div><div class="hand-hp${hpModified ? " modified" : ""}">${hp ?? 0}</div>` : ""}
        ${modified ? `<div class="hand-modified-dot" title="Carta modificada"></div>` : ""}
      `;
      div.appendChild(overlay);
    }
    return div;
  }

  // Fallback: renderiza com overlays como antes
  div.className = "card " + (card.type === "SPELL" ? "spell" : "minion");
  if (isEchoTemp) div.classList.add("echo-temporary");
  const cost = costOverride ?? card.cost ?? 0;
  div.innerHTML = `
    <div class="cost">${cost}</div>
    <div class="name">${escapeHtml(card.name)}</div>
    <div class="text">${escapeHtml(card.text || "")}</div>
    <div class="tags">${(card.tags || []).slice(0, 3).map(t => `<span class="tag">${tagShort(t)}</span>`).join("")}</div>
    ${card.type === "MINION"
      ? `<div class="footer"><div class="atk">${card.attack ?? 0}</div><div class="hp">${card.health ?? 0}</div></div>`
      : `<div class="footer" style="height:32px;"></div>`}
  `;
  return div;
}

// ====== Tabuleiro ======
function renderBoard() {
  const root = document.getElementById("board-root");
  root.innerHTML = "";

  const isMyTurn = state.current_player === myPid;
  const opp = state.opponent;
  const me = state.you;

  // Layout: arena central com 4 zonas verticais + coluna direita com decks
  // ┌────────────────── ARENA ──────────────────┐ ┌── DECKS ──┐
  // │  mão do oponente (cards-back)             │ │  oponente │
  // │  hero oponente + mana                      │ │           │
  // │ ─── linha divisória (campo do oponente) ── │ │           │
  // │  campo do oponente (lacaios)               │ │           │
  // │ ─── linha do meio ──────────────────────── │ │           │
  // │  campo do jogador (lacaios)                │ │           │
  // │ ─── linha divisória (sua mão) ───────────  │ │           │
  // │  hero jogador + mana                       │ │  jogador  │
  // │  mão do jogador                            │ │           │
  // └────────────────────────────────────────────┘ └───────────┘

  const layout = document.createElement("div");
  layout.className = "arena-layout";

  // ============== COLUNA CENTRAL (ARENA) ==============
  const arena = document.createElement("div");
  arena.className = "arena-center";

  // 1) Mão do oponente (back das cartas)
  const oppHandBox = document.createElement("div");
  oppHandBox.className = "zone zone-opp-hand";
  for (let i = 0; i < opp.hand_size; i++) {
    const back = document.createElement("div");
    back.className = "card-back";
    oppHandBox.appendChild(back);
  }
  arena.appendChild(oppHandBox);

  // 2) Strip do oponente (hero centralizado + mana)
  const oppStrip = document.createElement("div");
  oppStrip.className = "player-strip opponent";
  // esquerda: nome
  const oppLeft = document.createElement("div");
  oppLeft.className = "left-info";
  oppLeft.innerHTML = `<div class="player-name">${escapeHtml(opp.name)}</div>`;
  oppStrip.appendChild(oppLeft);
  oppStrip.appendChild(renderHero(opp, !isMyTurn, true));
  const oppRight = document.createElement("div");
  oppRight.className = "right-info";
  oppRight.innerHTML = `
    <div class="mana-text">${opp.mana} / ${opp.max_mana}</div>
    <div class="mana-display">${renderManaCrystals(opp.mana, opp.max_mana)}</div>
  `;
  oppStrip.appendChild(oppRight);
  arena.appendChild(oppStrip);

  // 4) Campo de batalha (2 fileiras com divisão clara no meio)
  const battlefield = document.createElement("div");
  battlefield.className = "battlefield";

  const oppBoard = document.createElement("div");
  oppBoard.className = "row-board opp";
  oppBoard.dataset.zone = "opp-field";
  for (const m of opp.board) oppBoard.appendChild(renderMinion(m, true));
  battlefield.appendChild(oppBoard);

  // linha divisória do meio do tabuleiro
  const midLine = document.createElement("div");
  midLine.className = "field-divider";
  battlefield.appendChild(midLine);

  const myBoard = document.createElement("div");
  myBoard.className = "row-board you";
  myBoard.dataset.zone = "my-field";
  for (const m of me.board) myBoard.appendChild(renderMinion(m, false));
  battlefield.appendChild(myBoard);
  arena.appendChild(battlefield);

  // 5) Strip do jogador (hero centralizado + mana)
  const myStrip = document.createElement("div");
  myStrip.className = "player-strip you";
  const myLeft = document.createElement("div");
  myLeft.className = "left-info";
  myLeft.innerHTML = `<div class="player-name">${escapeHtml(me.name)}</div>`;
  myStrip.appendChild(myLeft);
  myStrip.appendChild(renderHero(me, isMyTurn, false));
  const myRight = document.createElement("div");
  myRight.className = "right-info";
  myRight.innerHTML = `
    <div class="mana-text">${me.mana} / ${me.max_mana}</div>
    <div class="mana-display">${renderManaCrystals(me.mana, me.max_mana)}</div>
  `;
  myStrip.appendChild(myRight);
  arena.appendChild(myStrip);

  // 6) Mão do jogador (cartas reais) - layout em arco leve.
  const myHand = document.createElement("div");
  myHand.className = "zone zone-my-hand hand-row";
  myHand.dataset.zone = "my-hand";
  const handCards = [];
  for (const c of me.hand) {
    const card = allCards[c.card_id];
    if (!card) continue;
    const el = renderCard(card, c.effective_cost ?? c.cost_override, {
      echo_temporary: c.echo_temporary,
      effective_attack: c.effective_attack,
      effective_health: c.effective_health,
      stats_modified: c.stats_modified,
      cost_modified: c.cost_modified,
      show_hand_stats: true,
    });
    const cost = c.effective_cost ?? c.cost_override ?? card.cost ?? 0;
    // Tomo Amaldiçoado: o próximo feitiço pode pagar com vida em vez de mana,
    // então não fica "unaffordable" só por falta de mana.
    const spellPaysHealth = card.type === "SPELL" && me.next_spell_costs_health === true;
    const canAfford = me.mana >= cost || (spellPaysHealth && me.hero_health > 0);
    if (!isMyTurn || !canAfford) el.classList.add("unaffordable");
    else el.classList.add("playable");
    const activation = getHandCardActivationSignal(c, card);
    if (isMyTurn && canAfford && activation.active) {
      el.classList.add("effect-ready");
      el.title = activation.reason || "Efeito condicional ativo";
    }
    if (spellPaysHealth) el.classList.add("pays-with-health");
    el.dataset.handId = c.instance_id;
    if (arrivingDrawHandIds.has(String(c.instance_id))) {
      el.classList.add("draw-arriving");
    }
    attachHandHoverPreview(el, c);
    // Drag-and-drop só faz sentido para lacaios jogáveis. Spells e weapons
    // continuam usando o fluxo de clique.
    if (isMyTurn && canAfford && card.type === "MINION") {
      el.classList.add("draggable-minion");
      el.addEventListener("mousedown", (ev) => onHandCardMouseDown(ev, c, card, el));
    }
    el.onclick = () => onHandCardClick(c, card);
    handCards.push({ el, c, card });
    myHand.appendChild(el);
  }
  // Mão em linha reta: sem arco, sem rotação e sem queda nas pontas.
  // Mantemos as variáveis para que o CSS de hover/estados continue compondo
  // transforms sem precisar reintroduzir estilos inline por carta.
  handCards.forEach(({ el }) => {
    el.style.setProperty("--hand-fan-y", "0px");
    el.style.setProperty("--hand-rot", "0deg");
  });
  arena.appendChild(myHand);

  // Decks à direita da mesa (absoluto, dentro do arena)
  const sidebar = document.createElement("div");
  sidebar.className = "deck-sidebar";
  sidebar.appendChild(renderDeckPile(opp, true));
  sidebar.appendChild(renderDeckPile(me, false));
  arena.appendChild(sidebar);

  // === Medalhão de Encerrar Turno (estilo Hearthstone, à direita do meio) ===
  // O botão de "Render-se" foi movido pro painel de configurações flutuante
  // (canto inferior direito da tela, gerenciado por /static/js/audio.js).
  const ctrl = document.createElement("div");
  ctrl.className = "controls-bar";
  const endBtn = document.createElement("button");
  endBtn.className = "end-turn-btn " + (isMyTurn ? "active" : "waiting");
  endBtn.disabled = !isMyTurn;
  endBtn.innerHTML = isMyTurn
    ? `<div>Encerrar<br/>Turno</div>`
    : `<div>Vez do<br/>Oponente</div>`;
  endBtn.onclick = () => { if (isMyTurn) { cancelModes(); send("end_turn"); } };
  ctrl.appendChild(endBtn);
  arena.appendChild(ctrl);

  layout.appendChild(arena);
  root.appendChild(layout);

  if (targetingMode || attackingMode) {
    decorateTargetCandidates();
  }
}

// Renderiza pilha do deck à direita, estilo Hearthstone: 3-4 cartas
// empilhadas, com contador grande no centro e identificação de qual jogador
function renderDeckPile(player, isOpponent) {
  const wrap = document.createElement("div");
  wrap.className = "deck-pile " + (isOpponent ? "opp" : "you");
  wrap.dataset.pileOwner = String(player.player_id);

  // 3 backs empilhados sob o contador (visualmente sugere espessura)
  const stack = document.createElement("div");
  stack.className = "deck-stack";
  for (let i = 0; i < Math.min(4, player.deck_size); i++) {
    const back = document.createElement("div");
    back.className = "deck-back";
    back.style.transform = `translate(${i*1.5}px, ${-i*1.5}px)`;
    stack.appendChild(back);
  }
  wrap.appendChild(stack);

  // Contador
  const count = document.createElement("div");
  count.className = "deck-count";
  count.textContent = player.deck_size;
  wrap.appendChild(count);

  // Etiqueta
  const label = document.createElement("div");
  label.className = "deck-label";
  label.textContent = isOpponent ? "Deck do oponente" : "Seu deck";
  wrap.appendChild(label);

  return wrap;
}

function isHeroBurning(playerId) {
  return (state?.public_statuses || []).some(s => s.kind === "hero_burning" && s.player_id === playerId);
}

function renderHero(player, isActive, isOpponent) {
  const div = document.createElement("div");
  div.className = "hero" + (isActive ? " active" : "") + (isOpponent ? " opponent" : "") + (isHeroBurning(player.player_id) ? " burning" : "");
  div.dataset.targetId = `hero:${player.player_id}`;
  div.dataset.heroOwner = player.player_id;

  const key = (player.name || "").toLowerCase();
  const heroImg = heroImages[key];
  const initial = (player.name || "?").charAt(0).toUpperCase();
  const portraitStyle = heroImg ? `background-image: url('${heroImg}');` : "";
  const portraitContent = heroImg ? "" : initial;

  div.innerHTML = `
    <div class="portrait-wrap">
      <div class="portrait" style="${portraitStyle}">${escapeHtml(portraitContent)}</div>
      ${player.hero_armor > 0 ? `<div class="armor-badge">${player.hero_armor}</div>` : ""}
      <div class="hp-badge">${player.hero_health}</div>
    </div>
    <div class="nm">${escapeHtml(player.name)}</div>
  `;
  div.onclick = () => onTargetClick(`hero:${player.player_id}`);
  return div;
}

function renderManaCrystals(curr, max) {
  let html = "";
  for (let i = 0; i < 10; i++) {
    let cls = "mana-crystal";
    if (i >= max) cls += " locked";
    else if (i >= curr) cls += " spent";
    html += `<div class="${cls}"></div>`;
  }
  return html;
}

// Detecta se a carta tem efeito contínuo/passivo: qualquer trigger que NÃO
// seja ON_PLAY (battlecry/grito de guerra) nem ON_DEATH (último suspiro).
// Inclui AURA, START_OF_TURN, END_OF_TURN, AFTER_FRIENDLY_MINION_PLAY, etc.
function hasPassiveEffect(card) {
  const effects = card.effects || [];
  return effects.some(e => {
    const t = e.trigger;
    return t && t !== "ON_PLAY" && t !== "ON_DEATH";
  });
}

function getActivatableEffectsForMinion(m) {
  const card = allCards[m.card_id] || {};
  if (m.silenced || m.immune || m.frozen || (m.tags || []).includes("DORMANT")) return [];
  return (card.effects || []).filter(e =>
    e.trigger === "ACTIVATED_ABILITY" || e.trigger === "DURING_YOUR_TURN"
  );
}

function getAbilityTotalUses(m, eff, abilityIndex = 0) {
  if (!eff) return null;
  if (typeof eff.activation_uses === "number") return eff.activation_uses;
  if (m.card_id === "ramoninho_mestre_da_nerf") return 3;
  return null;
}

function getAbilityUsesRemaining(m, eff, abilityIndex = 0) {
  const total = getAbilityTotalUses(m, eff, abilityIndex);
  if (total === null) return null;
  const uses = m.ability_uses_remaining || {};
  const key = String(abilityIndex);
  return typeof uses[key] === "number" ? uses[key] : total;
}

function getAbilityCost(m, eff, abilityIndex = 0) {
  return getAbilityTotalUses(m, eff, abilityIndex) !== null ? 0 : (eff.activation_cost || 0);
}

function canUseMinionAbility(m, eff, abilityIndex = 0) {
  if (!state || state.current_player !== myPid) return false;
  if (m.owner !== myPid) return false;
  if (m.silenced || m.immune || m.frozen || (m.tags || []).includes("DORMANT")) return false;
  const remaining = getAbilityUsesRemaining(m, eff, abilityIndex);
  if (remaining !== null) return remaining > 0;
  if ((m.activated_abilities_this_turn || 0) > 0) return false;
  const cost = getAbilityCost(m, eff, abilityIndex);
  if ((state.you?.mana || 0) < cost) return false;
  return true;
}

function abilityNeedsChosenTarget(eff) {
  if (!eff) return false;
  if (eff.target && eff.target.mode === "CHOSEN") return true;
  if (eff.source && eff.source.mode === "CHOSEN") return true;
  for (const sub of (eff.effects || [])) {
    if (abilityNeedsChosenTarget(sub)) return true;
  }
  for (const sub of (eff.additional_effects || [])) {
    if (abilityNeedsChosenTarget(sub)) return true;
  }
  return false;
}

function showMoveSelfZoneModal(m, eff, abilityIndex = 0) {
  clearPendingChoiceOverlay();

  const overlay = document.createElement("div");
  overlay.className = "choose-one-overlay pending-choice-overlay";

  const title = document.createElement("h2");
  title.textContent = "Escolha para onde mover";
  overlay.appendChild(title);

  const msg = document.createElement("div");
  msg.className = "muted";
  msg.textContent = "Escolha a zona de destino para este lacaio.";
  overlay.appendChild(msg);

  const row = document.createElement("div");
  row.className = "row";
  row.style.justifyContent = "center";
  row.style.flexWrap = "wrap";

  const sendMove = (zone, position = null) => {
    const payload = {
      minion_id: m.instance_id,
      ability_index: abilityIndex,
      zone
    };
    if (position !== null) payload.position = position;
    send("activate_ability", payload);
    clearPendingChoiceOverlay();
  };

  const valid = eff.valid_zones || [];
  if (valid.includes("HAND")) {
    const btn = document.createElement("button");
    btn.className = "btn primary";
    btn.textContent = "Mão";
    btn.onclick = () => sendMove("HAND");
    row.appendChild(btn);
  }
  if (valid.includes("GRAVEYARD")) {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.textContent = "Mortos";
    btn.onclick = () => sendMove("GRAVEYARD");
    row.appendChild(btn);
  }
  if (valid.includes("DECK")) {
    ["TOP", "MIDDLE", "BOTTOM"].forEach(pos => {
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = pos === "TOP" ? "Topo do deck" : pos === "BOTTOM" ? "Fundo do deck" : "Meio do deck";
      btn.onclick = () => sendMove("DECK", pos);
      row.appendChild(btn);
    });
  }
  if (valid.includes("BOARD_POSITION")) {
    const boardSize = (state.you?.board || []).length;
    for (let i = 0; i < boardSize; i++) {
      const btn = document.createElement("button");
      btn.className = "btn small";
      btn.textContent = `Campo ${i + 1}`;
      btn.onclick = () => sendMove("BOARD_POSITION", i);
      row.appendChild(btn);
    }
  }

  overlay.appendChild(row);

  const cancel = document.createElement("button");
  cancel.className = "btn";
  cancel.textContent = "Cancelar";
  cancel.onclick = () => clearPendingChoiceOverlay();
  overlay.appendChild(cancel);

  document.getElementById("overlay-root").appendChild(overlay);
}

function onAbilityButtonClick(e, m, eff, abilityIndex = 0) {
  e.stopPropagation();
  if (!canUseMinionAbility(m, eff, abilityIndex)) {
    const remaining = getAbilityUsesRemaining(m, eff, abilityIndex);
    if (remaining !== null && remaining <= 0) toast("Habilidade sem usos restantes");
    else if ((m.activated_abilities_this_turn || 0) > 0) toast("Habilidade já usada neste turno");
    else if ((state.you?.mana || 0) < getAbilityCost(m, eff, abilityIndex)) toast("Mana insuficiente");
    else toast("Habilidade indisponível");
    return;
  }

  if (eff.trigger === "DURING_YOUR_TURN" && eff.action === "MOVE_SELF_TO_ZONE") {
    showMoveSelfZoneModal(m, eff, abilityIndex);
    return;
  }

  if (abilityNeedsChosenTarget(eff)) {
    abilityMode = { minion_id: m.instance_id, effect: eff, ability_index: abilityIndex };
    attackingMode = null;
    targetingMode = null;
    toast("Escolha um alvo para a habilidade (ESC para cancelar)");
    render();
    return;
  }

  send("activate_ability", { minion_id: m.instance_id, ability_index: abilityIndex });
}



function ensureHoverCardRoot() {
  let el = document.getElementById("hover-card-preview");
  if (!el) {
    el = document.createElement("div");
    el.id = "hover-card-preview";
    document.body.appendChild(el);
  }
  return el;
}

function normalizeTokenPreviewCard(token) {
  return {
    id: token.id || token.card_id || `token-${token.name || "lacaio"}`,
    name: token.name || "Lacaio",
    type: token.type || "MINION",
    cost: token.cost ?? 0,
    attack: token.attack ?? 0,
    health: token.health ?? 0,
    durability: token.durability ?? null,
    text: token.text || "",
    tags: token.tags || [],
    tribes: token.tribes || [],
    effects: token.effects || [],
  };
}

function collectKeywordHelpEntries(card, runtimeKeywords = []) {
  const found = new Set();
  for (const tag of [...(card.tags || []), ...(runtimeKeywords || [])]) {
    if (KW_DESCRIPTION[tag]) found.add(tag);
  }

  for (const effect of (card.effects || [])) {
    const trigger = effect.trigger || "";
    const action = effect.action || "";
    if (trigger === "ON_DEATH") found.add("DEATHRATTLE");
    if (trigger === "ON_COMBO") found.add("COMBO");
    if (trigger === "ACTIVATED_ABILITY" || trigger === "DURING_YOUR_TURN") found.add("ACTIVATED_ABILITY");
    if (trigger === "ON_PLAY_EMPOWERED" || trigger === "ON_EMPOWER") found.add("EMPOWER");
    if (action.includes("FREEZE")) found.add("FREEZE");
    if (action.includes("RECRUIT")) found.add("RECRUIT");
  }

  return KEYWORD_PANEL_ORDER
    .filter(key => found.has(key))
    .map(key => ({ key, name: KW_NAME[key] || key, description: KW_DESCRIPTION[key] }));
}

function appendKeywordHelpPreview(root, card, runtimeKeywords = []) {
  const entries = collectKeywordHelpEntries(card, runtimeKeywords);
  if (!entries.length) return;

  root.classList.add("has-keywords");
  const wrap = document.createElement("div");
  wrap.className = "keyword-help-preview";
  const label = document.createElement("div");
  label.className = "keyword-help-label";
  label.textContent = "Keywords";
  wrap.appendChild(label);

  for (const entry of entries) {
    const item = document.createElement("div");
    item.className = "keyword-help-item";
    const title = document.createElement("div");
    title.className = "keyword-help-title";
    title.textContent = entry.name;
    const text = document.createElement("div");
    text.className = "keyword-help-text";
    text.textContent = entry.description;
    item.appendChild(title);
    item.appendChild(text);
    wrap.appendChild(item);
  }

  root.insertBefore(wrap, root.firstChild);
}

const CARD_RELATED_PREVIEW_IDS = {
  gusnabo_sagrado: ["pera_sagrada"],
  traficante: ["substancias_ilicitas"],
};

function getRelatedPreviewCards(card) {
  const previews = [];
  const seen = new Set();
  const addPreview = (previewCard, amount = null, trigger = "") => {
    if (!previewCard) return;
    const key = previewCard.id || previewCard.name;
    if (seen.has(key)) return;
    seen.add(key);
    previews.push({ card: previewCard, amount, trigger });
  };

  for (const relatedId of (CARD_RELATED_PREVIEW_IDS[card.id] || [])) {
    addPreview(allCards[relatedId] || null);
  }

  for (const effect of (card.effects || [])) {
    const action = effect.action || "";
    const previewId = effect.card_id || effect.summon_card_id;
    if (previewId && (action.includes("SUMMON") || action.includes("CAST_CARD") || action.includes("DRAW_SPELL"))) {
      addPreview(allCards[previewId] || null, effect.amount || effect.summon_count || effect.summon_count_source || null, effect.trigger || "");
    } else if (action.includes("SUMMON") && effect.token) {
      addPreview(normalizeTokenPreviewCard(effect.token), effect.amount || effect.summon_count || effect.summon_count_source || null, effect.trigger || "");
    }
  }
  return previews;
}

function appendRelatedSummonPreviews(root, card) {
  const relatedSummons = getRelatedPreviewCards(card);
  if (!relatedSummons.length) return;

  root.classList.add("has-related");
  const relatedWrap = document.createElement("div");
  relatedWrap.className = "related-summon-preview";
  relatedWrap.innerHTML = `<div class="related-summon-label">Relacionadas</div>`;

  for (const related of relatedSummons) {
    const relatedItem = document.createElement("div");
    relatedItem.className = "related-summon-item";
    const relatedCard = renderCard(related.card, related.card.cost ?? 0, { show_hand_stats: true });
    relatedCard.classList.add("summoned-preview-card");
    relatedItem.appendChild(relatedCard);
    if (related.amount && related.amount !== 1) {
      const amountBadge = document.createElement("div");
      amountBadge.className = "related-summon-amount";
      amountBadge.textContent = `x${related.amount}`;
      relatedItem.appendChild(amountBadge);
    }
    relatedWrap.appendChild(relatedItem);
  }
  root.appendChild(relatedWrap);
}

function showMinionCardPreview(m, ev) {
  const card = allCards[m.card_id] || {};
  if (!card || !card.id) return;
  const root = ensureHoverCardRoot();
  root.innerHTML = "";
  root.classList.remove("has-related", "has-keywords");

  const previewCard = renderCard(card, card.cost ?? 0, {
    show_hand_stats: true,
    effective_attack: m.attack,
    effective_health: m.health,
    stats_modified: m.attack !== (card.attack ?? 0) || m.max_health !== (card.health ?? 0),
  });
  previewCard.classList.add("primary-preview-card");
  root.appendChild(previewCard);
  if (!m.silenced) appendKeywordHelpPreview(root, card, m.keywords || []);
  if (!m.silenced) appendRelatedSummonPreviews(root, card);
  if (!m.silenced && (m.related_card_ids || []).length) {
    const oldIds = CARD_RELATED_PREVIEW_IDS[card.id];
    CARD_RELATED_PREVIEW_IDS[card.id] = [...(oldIds || []), ...(m.related_card_ids || [])];
    appendRelatedSummonPreviews(root, { ...card, id: card.id });
    if (oldIds) CARD_RELATED_PREVIEW_IDS[card.id] = oldIds;
    else delete CARD_RELATED_PREVIEW_IDS[card.id];
  }

  root.classList.add("visible");
  moveMinionCardPreview(ev);
}

// Preview de carta da mão (após hover de 1.5s). Reusa o mesmo overlay do
// preview de lacaio, mas mostra os stats corretos da CardInHand (com buffs
// de stat_modifier já aplicados).
function showHandCardPreview(handCard, ev) {
  const card = allCards[handCard.card_id] || {};
  if (!card || !card.id) return;
  const root = ensureHoverCardRoot();
  root.innerHTML = "";
  root.classList.remove("has-related", "has-keywords");
  const previewCard = renderCard(card, handCard.effective_cost ?? handCard.cost_override ?? card.cost ?? 0, {
    show_hand_stats: true,
    effective_attack: handCard.effective_attack,
    effective_health: handCard.effective_health,
    stats_modified: handCard.stats_modified,
    cost_modified: handCard.cost_modified,
  });
  root.appendChild(previewCard);
  appendKeywordHelpPreview(root, card, [
    ...((card.tags || [])),
    ...((handCard.extra_tags || [])),
  ]);
  if (card.type === "MINION") appendRelatedSummonPreviews(root, card);
  root.classList.add("visible");
  moveMinionCardPreview(ev);
}

function attachHandHoverPreview(el, handCard) {
  el.addEventListener("mouseenter", (ev) => {
    hoverPreviewLastEvent = ev;
    clearTimeout(hoverPreviewTimer);
    hoverPreviewTimer = setTimeout(() => {
      // Não mostra preview enquanto arrastando.
      if (dragState) return;
      showHandCardPreview(handCard, hoverPreviewLastEvent || ev);
    }, 1500);
  });
  el.addEventListener("mousemove", (ev) => {
    hoverPreviewLastEvent = ev;
    moveMinionCardPreview(ev);
  });
  el.addEventListener("mouseleave", () => {
    clearTimeout(hoverPreviewTimer);
    hoverPreviewTimer = null;
    hideMinionCardPreview();
  });
}

// === Drag-and-drop de lacaios da mão ===
//
// Posição escolhida pelo último drop. Injetada em todo `send("play_card", ...)`
// via sendPlayCard() para que o backend coloque o lacaio onde o jogador
// soltou a carta. É consumida em qualquer envio de play_card e zerada
// depois para não vazar para a próxima jogada.
let pendingPlayPosition = null;
// Flag curto após mouseup do drag para suprimir o click subsequente que
// o browser dispara automaticamente.
let dragJustEnded = false;

function sendPlayCard(payload) {
  if (pendingPlayPosition !== null && pendingPlayPosition !== undefined) {
    payload = Object.assign({}, payload, { position: pendingPlayPosition });
  }
  pendingPlayPosition = null;
  send("play_card", payload);
}

function onHandCardMouseDown(ev, handCard, card, sourceEl) {
  if (ev.button !== 0) return;                  // só botão esquerdo
  if (state.current_player !== myPid) return;
  if (targetingMode || abilityMode || attackingMode) return;
  ev.preventDefault();

  // Esconde preview imediatamente.
  clearTimeout(hoverPreviewTimer);
  hideMinionCardPreview();

  // Cria ghost que segue o cursor. O ghost mora fora da arena (no body),
  // então precisa replicar a escala da arena para casar com o tamanho
  // visual do que está sendo arrastado.
  const ghost = sourceEl.cloneNode(true);
  ghost.classList.add("drag-ghost");
  ghost.style.transform = `scale(${arenaScale})`;
  ghost.style.transformOrigin = "center center";
  ghost.style.position = "fixed";
  ghost.style.pointerEvents = "none";
  ghost.style.zIndex = "9999";
  ghost.style.opacity = "0.92";
  ghost.style.left = "-9999px";
  document.body.appendChild(ghost);
  sourceEl.classList.add("dragging-source");

  dragState = {
    handCard, card, sourceEl, ghost,
    dropPosition: null,
  };

  positionDragGhost(ev);
  updateBoardDropIndicator(ev);

  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup", onDragUp);
  document.addEventListener("keydown", onDragKeydown);
}

function positionDragGhost(ev) {
  if (!dragState) return;
  const g = dragState.ghost;
  // Centraliza visualmente no cursor. Como transform-origin é center, a
  // posição (left,top) define o canto da box NÃO-escalada e o centro
  // visual fica em (left + w/2, top + h/2) - independente do scale.
  const w = g.offsetWidth || 210;
  const h = g.offsetHeight || 304;
  g.style.left = `${ev.clientX - w / 2}px`;
  g.style.top = `${ev.clientY - h / 2}px`;
}

function clearBoardDropIndicators() {
  document.querySelectorAll(".drop-indicator").forEach(n => n.remove());
}

function updateBoardDropIndicator(ev) {
  const board = document.querySelector('[data-zone="my-field"]');
  clearBoardDropIndicators();
  if (!board || !dragState) return;
  const rect = board.getBoundingClientRect();
  // Margem vertical generosa: o jogador pode soltar um pouco acima/abaixo.
  const inside =
    ev.clientX >= rect.left - 24 && ev.clientX <= rect.right + 24
    && ev.clientY >= rect.top - 60 && ev.clientY <= rect.bottom + 60;
  if (!inside) {
    dragState.dropPosition = null;
    return;
  }
  const minions = Array.from(board.querySelectorAll(".minion"));
  let pos = minions.length;
  for (let i = 0; i < minions.length; i++) {
    const r = minions[i].getBoundingClientRect();
    if (ev.clientX < r.left + r.width / 2) {
      pos = i;
      break;
    }
  }
  dragState.dropPosition = pos;
  const ind = document.createElement("div");
  ind.className = "drop-indicator";
  if (pos < minions.length) {
    board.insertBefore(ind, minions[pos]);
  } else {
    board.appendChild(ind);
  }
}

function onDragMove(ev) {
  if (!dragState) return;
  positionDragGhost(ev);
  updateBoardDropIndicator(ev);
}

function onDragKeydown(ev) {
  if (ev.key === "Escape") {
    cancelDrag();
  }
}

function cancelDrag() {
  if (!dragState) return;
  dragState.ghost.remove();
  dragState.sourceEl.classList.remove("dragging-source");
  clearBoardDropIndicators();
  dragState = null;
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", onDragUp);
  document.removeEventListener("keydown", onDragKeydown);
}

function onDragUp(ev) {
  if (!dragState) return;
  const pos = dragState.dropPosition;
  const { handCard, card } = dragState;
  cancelDrag();
  if (pos === null || pos === undefined) {
    // soltou fora do campo: cancela sem jogar. O browser ainda dispara
    // um click sintético na carta-fonte; precisa suprimir.
    dragJustEnded = true;
    setTimeout(() => { dragJustEnded = false; }, 50);
    return;
  }
  // Marca a posição e segue o fluxo normal de play (que pode abrir
  // targeting/empower/choose-one antes de enviar play_card). Só depois
  // ativa o supressor de click - assim a chamada abaixo não é bloqueada.
  pendingPlayPosition = pos;
  onHandCardClick(handCard, card);
  dragJustEnded = true;
  setTimeout(() => { dragJustEnded = false; }, 50);
}

function moveMinionCardPreview(ev) {
  const root = document.getElementById("hover-card-preview");
  if (!root || !root.classList.contains("visible")) return;
  const margin = 18;
  // O preview tem tamanho fixo via CSS: 360x520 em desktops grandes,
  // 300x430 em telas menores. Usamos o tamanho real renderizado para
  // posicionar com precisão, com fallback sensato.
  const rect = root.getBoundingClientRect();
  const width = rect.width || 320;
  const height = rect.height || 460;

  // X: prefere à esquerda do cursor; se não couber, vai à direita.
  let left = ev.clientX - width - margin;
  if (left < 8) left = Math.min(window.innerWidth - width - 8, ev.clientX + margin);

  // Y: prefere ACIMA do cursor (cartas da mão ficam no rodapé da tela e
  // o preview centralizado vertical estoura embaixo). Se não couber acima,
  // tenta abaixo; em último caso, encosta no topo.
  let top = ev.clientY - height - margin;
  if (top < 8) {
    const below = ev.clientY + margin;
    top = (below + height + 8 <= window.innerHeight) ? below : 8;
  }
  top = Math.max(8, Math.min(window.innerHeight - height - 8, top));

  root.style.left = `${left}px`;
  root.style.top = `${top}px`;
}

function hideMinionCardPreview() {
  const root = document.getElementById("hover-card-preview");
  if (!root) return;
  root.classList.remove("visible", "has-related", "has-keywords");
  root.innerHTML = "";
}


function renderMinion(m, isOpponent) {
  const div = document.createElement("div");
  div.className = "minion" + (isOpponent ? " opponent" : "");
  div.dataset.minionId = m.instance_id;
  div.dataset.owner = isOpponent ? "opp" : "me";

  // Estados visuais ambientais (efeitos em torno do lacaio)
  const card = allCards[m.card_id] || {};
  const isDormant = (m.tags || []).includes("DORMANT");
  const isPassive = hasPassiveEffect(card);

  if (isDormant) div.classList.add("dormant");
  if (!isDormant && m.tags.includes("TAUNT") && !m.silenced) div.classList.add("taunt");
  if (!isDormant && m.divine_shield) div.classList.add("divine-shield");
  if (!isDormant && m.frozen) div.classList.add("frozen");
  if (!isDormant && m.tags.includes("STEALTH") && !m.silenced) div.classList.add("stealth");
  if (!isDormant && m.tags.includes("WINDFURY") && !m.silenced) div.classList.add("windfury");
  if (m.silenced) div.classList.add("silenced");

  if (!isOpponent && state.current_player === myPid && m.can_attack) {
    div.classList.add("can-attack");
  }
  const isSick = m.summoning_sick
    && !(m.tags.includes("CHARGE") || m.tags.includes("RUSH"));
  if (isSick) div.classList.add("sick");

  // Imagem do retrato
  const hasImg = !!cardImages[m.card_id];
  const portraitStyle = hasImg
    ? `background-image: url('${cardImages[m.card_id]}');`
    : "";
  const initial = hasImg ? "" : `<span class="initial">${(m.name || "?").charAt(0)}</span>`;
  const ringClass = "portrait-ring" + (hasImg ? " has-image" : "");

  // === SELO CENTRAL ===
  // Apenas Deathrattle ou Passive (efeito contínuo) ganham selo central.
  // Battlecry/Charge/Rush/Windfury NÃO recebem selo (Windfury vira anel de vento).
  let primarySeal = null;
  if (!isDormant && m.tags.includes("POISONOUS") && !m.silenced) {
    primarySeal = "POISONOUS";
  } else if (!isDormant && m.tags.includes("DEATHRATTLE") && !m.silenced) {
    primarySeal = "DEATHRATTLE";
  } else if (!isDormant && isPassive && !m.silenced) {
    primarySeal = "PASSIVE";
  }

  // Lista completa de keywords visíveis (pra tooltip)
  const visibleKws = (m.keywords || []);
  if (isPassive && !visibleKws.includes("PASSIVE")) visibleKws.push("PASSIVE");

  const atkChanged = m.attack > (card.attack ?? 0) ? "buffed" : "";
  const hpChanged =
    m.health < m.max_health ? "damaged" :
    m.max_health > (card.health ?? 0) ? "buffed" : "";

  // Fonte dinâmica do nameplate baseada no comprimento do nome
  let nameClass = "nameplate";
  const nLen = (m.name || "").length;
  if (nLen > 26) nameClass += " huge";
  else if (nLen > 20) nameClass += " very-long";
  else if (nLen > 14) nameClass += " long";

  // Overlays ambientais
  const tauntOverlay = (m.tags.includes("TAUNT") && !m.silenced)
    ? `<div class="taunt-shield">${SVG_TAUNT_SHIELD}</div>` : "";
  const divineOverlay = m.divine_shield
    ? `<div class="divine-bubble"></div>` : "";
  const stealthOverlay = (m.tags.includes("STEALTH") && !m.silenced)
    ? `<div class="stealth-mist"></div>` : "";
  const frozenOverlay = m.frozen
    ? `<div class="freeze-ice">${SVG_FREEZE}</div>` : "";
  const windOverlay = (m.tags.includes("WINDFURY") && !m.silenced)
    ? `<div class="wind-around">${SVG_WIND}</div>` : "";
  const silenceOverlay = m.silenced ? `<div class="silence-mark"></div>` : "";

  const activatableEffects = getActivatableEffectsForMinion(m);
  const firstAbility = activatableEffects[0] || null;
  const abilityRemaining = firstAbility ? getAbilityUsesRemaining(m, firstAbility, 0) : null;
  const abilityCost = firstAbility ? getAbilityCost(m, firstAbility, 0) : 0;
  const canAbility = firstAbility && !isOpponent && canUseMinionAbility(m, firstAbility, 0);
  const abilityLabel = firstAbility
    ? (abilityRemaining !== null
        ? `✦${abilityRemaining}`
        : (firstAbility.trigger === "ACTIVATED_ABILITY" ? `✦${abilityCost}` : "↯"))
    : "";
  const linked = m.linked_minion || null;
  const linkedCard = m.linked_card || null;
  const linkedData = linked || linkedCard;
  const linkedImg = linkedData && cardImages[linkedData.card_id]
    ? `<span class="linked-minion-portrait has-image" title="Vinculado a ${escapeHtml(linkedData.name || cardName(linkedData.card_id, linkedData.card_id))}" style="background-image:url('${cardImages[linkedData.card_id]}')"></span>`
    : (linkedData ? `<span class="linked-minion-portrait" title="Vinculado a ${escapeHtml(linkedData.name || linkedData.card_id)}">${escapeHtml((linkedData.name || '?').charAt(0))}</span>` : "");

  div.innerHTML = `
    <div class="${nameClass}">${escapeHtml(m.name)}</div>
    ${firstAbility && !isOpponent && !isDormant ? `<button class="ability-btn ${canAbility ? "ready" : "disabled"}" title="Usos/custo da habilidade">${abilityLabel}</button>` : ""}
    ${!isDormant ? tauntOverlay : ""}
    ${!isDormant ? windOverlay : ""}
    <div class="${ringClass}" style="${portraitStyle}">${initial}</div>
    ${!isDormant ? stealthOverlay : ""}
    ${!isDormant ? divineOverlay : ""}
    ${!isDormant ? frozenOverlay : ""}
    ${silenceOverlay}
    ${!isDormant ? `<div class="atk-badge ${atkChanged}">${m.attack}</div><div class="hp-badge ${hpChanged}">${m.health}</div>${linkedImg}` : `<div class="dormant-label">DORMENTE</div>`}
    ${primarySeal && !isDormant ? `<div class="keyword-seal" data-kw="${primarySeal}" title="${KW_NAME[primarySeal] || primarySeal}"></div>` : ""}
    ${isSick && !isDormant ? `<div class="zzz-anim"><span class="z z1">z</span><span class="z z2">z</span><span class="z z3">Z</span></div>` : ""}
  `;

  div.onmouseenter = (ev) => {
    hoverPreviewLastEvent = ev;
    clearTimeout(hoverPreviewTimer);
    hoverPreviewTimer = setTimeout(() => {
      showMinionCardPreview(m, hoverPreviewLastEvent || ev);
    }, 1500);
  };
  div.onmousemove = (ev) => {
    hoverPreviewLastEvent = ev;
    moveMinionCardPreview(ev);
  };
  div.onmouseleave = () => {
    clearTimeout(hoverPreviewTimer);
    hoverPreviewTimer = null;
    hideMinionCardPreview();
  };

  const abilityBtn = div.querySelector(".ability-btn");
  if (abilityBtn && firstAbility) {
    abilityBtn.onclick = (e) => onAbilityButtonClick(e, m, firstAbility, 0);
  }

  if (isOpponent) {
    div.onclick = () => onTargetClick(m.instance_id);
  } else {
    div.onclick = () => onMyMinionClick(m);
  }
  return div;
}

// ============ Detecção de candidatos a alvo ============
function decorateTargetCandidates() {
  // marca apenas alvos válidos (escolha de feitiço/battlecry, ou ataque)
  document.querySelectorAll(".minion, .hero").forEach(el => {
    el.classList.remove("targeting-active");
  });
  // Lacaio dormente nunca é alvo válido. Marcamos no DOM via tag DORMANT.
  const isDormantEl = (el) => {
    const id = el.dataset && el.dataset.minionId;
    if (!id) return false;
    const allBoards = [
      ...((state.you && state.you.board) || []),
      ...((state.opponent && state.opponent.board) || []),
    ];
    const m = allBoards.find(x => x.instance_id === id);
    return !!(m && (m.tags || []).includes("DORMANT"));
  };
  if (targetingMode || abilityMode) {
    // Validação final é do backend; aqui só indicamos alvos clicáveis.
    document.querySelectorAll(".minion, .hero").forEach(el => {
      if (el.classList.contains("minion") && isDormantEl(el)) return;
      el.classList.add("targeting-active");
    });
  }
  if (attackingMode) {
    // valid targets: lacaios oponentes não-dormentes e (se nenhum taunt-vivo) o herói.
    // Provocar imune não conta para fechamento (o engine também filtra).
    const oppHasTaunt = state.opponent.board.some(
      m => (m.keywords || []).includes("TAUNT") && !m.immune && !(m.tags || []).includes("DORMANT")
    );
    document.querySelectorAll(".minion[data-owner='opp']").forEach(el => {
      const id = el.dataset.minionId;
      const m = state.opponent.board.find(x => x.instance_id === id);
      if (!m) return;
      if ((m.tags || []).includes("DORMANT")) return;
      if (oppHasTaunt) {
        if ((m.keywords || []).includes("TAUNT") && !m.immune) el.classList.add("targeting-active");
      } else {
        el.classList.add("targeting-active");
      }
    });
    if (!oppHasTaunt) {
      const oppHero = document.querySelector(`.hero[data-hero-owner='${state.opponent.player_id}']`);
      if (oppHero) oppHero.classList.add("targeting-active");
    }
  }
}

// ============ Interações ============

function effectNeedsChosenTargetForPlay(eff) {
  if (!eff) return false;
  if (eff.action === "CHOOSE_ONE") {
    const choices = eff.choices || [];
    return choices.some(effectNeedsChosenTargetForPlay);
  }
  const src = eff.source || {};
  const tgt = eff.target || {};
  if (src.mode === "CHOSEN") return true;
  if (["CHOSEN", "CHOSEN_EACH", "CHOSEN_ADJACENT_DIRECTION"].includes(tgt.mode)) return true;
  for (const sub of (eff.effects || [])) {
    if (effectNeedsChosenTargetForPlay(sub)) return true;
  }
  for (const sub of (eff.additional_effects || [])) {
    if (effectNeedsChosenTargetForPlay(sub)) return true;
  }
  return false;
}


function collectChosenTargetDescsForEffect(eff, out = []) {
  if (!eff) return out;
  if (eff.action === "CHOOSE_ONE") {
    // Para CHOOSE_ONE genérico, a opção escolhida é tratada separadamente.
    return out;
  }
  const src = eff.source || {};
  const tgt = eff.target || {};
  if (src.mode === "CHOSEN") out.push(src);
  if (tgt.mode === "CHOSEN") out.push(tgt);
  else if (tgt.mode === "CHOSEN_EACH") {
    const n = (eff.amounts || []).length || Number(eff.amount || 1) || 1;
    for (let i = 0; i < Math.max(1, n); i++) {
      out.push({ ...tgt, mode: "CHOSEN" });
    }
  } else if (tgt.mode === "CHOSEN_ADJACENT_DIRECTION") {
    out.push({ ...tgt, mode: "CHOSEN" });
  }
  for (const sub of (eff.effects || [])) collectChosenTargetDescsForEffect(sub, out);
  for (const sub of (eff.additional_effects || [])) collectChosenTargetDescsForEffect(sub, out);
  return out;
}

function collectChosenTargetDescsForPlay(card, opts = {}) {
  const out = [];
  for (const eff of effectsForPlayMode(card, opts)) {
    collectChosenTargetDescsForEffect(eff, out);
  }
  return out;
}

function effectNeedsAdjacentDirection(eff) {
  if (!eff) return false;
  if ((eff.target || {}).mode === "CHOSEN_ADJACENT_DIRECTION") return true;
  if (eff.action === "CHOOSE_ONE") {
    return (eff.choices || []).some(effectNeedsAdjacentDirection);
  }
  for (const sub of (eff.effects || [])) {
    if (effectNeedsAdjacentDirection(sub)) return true;
  }
  for (const sub of (eff.additional_effects || [])) {
    if (effectNeedsAdjacentDirection(sub)) return true;
  }
  return false;
}


function minionHasTribe(minion, tribe) {
  if (!minion || !tribe) return false;
  const tribes = minion.tribes || [];
  return tribes.includes(tribe);
}

function cardHasTribeForUi(card, tribe) {
  if (!card || !tribe) return false;
  return (card.tribes || []).includes(tribe);
}

function handHasOtherCardWithTribe(handCard, tribe) {
  if (!tribe || !state?.you) return false;
  return (state.you.hand || []).some(other => {
    if (String(other.instance_id) === String(handCard?.instance_id)) return false;
    return cardHasTribeForUi(allCards[other.card_id], tribe);
  });
}

function allBoardMinionsForUi() {
  return [
    ...((state?.you && state.you.board) || []),
    ...((state?.opponent && state.opponent.board) || []),
  ];
}

function targetDescAllowsMinionForUi(desc, minion) {
  if (!desc || !minion || (minion.tags || []).includes("DORMANT")) return false;
  const valid = desc.valid || ["MINION"];
  const owner = minion.owner;
  const isFriendly = owner === state.you?.player_id;
  const isEnemy = owner === state.opponent?.player_id;
  const allowed = valid.includes("MINION")
    || (isFriendly && valid.includes("FRIENDLY_MINION"))
    || (isEnemy && valid.includes("ENEMY_MINION"));
  if (!allowed) return false;
  if (desc.required_tribe && !minionHasTribe(minion, desc.required_tribe)) return false;
  if (desc.tribe && !minionHasTribe(minion, desc.tribe)) return false;
  return true;
}

function anyTargetCandidateForUi(targetDescs, predicate = () => true) {
  const descs = (targetDescs || []).filter(d => d && d.mode === "CHOSEN");
  if (!descs.length) return false;
  return descs.some(desc => allBoardMinionsForUi().some(minion => (
    targetDescAllowsMinionForUi(desc, minion) && predicate(minion, desc)
  )));
}

function chosenTargetDescsForEffect(eff) {
  const out = [];
  collectChosenTargetDescsForEffect(eff, out);
  return out;
}

function evaluateHandConditionForUi(cond, card, handCard, context = {}) {
  if (!cond || !cond.type || !state?.you) return false;
  const me = state.you;
  const foe = state.opponent || {};
  const friendlyBoard = me.board || [];
  const enemyBoard = foe.board || [];
  const amount = Number(cond.amount ?? cond.count ?? 0);

  switch (cond.type) {
    case "FRIENDLY_MINION_TRIBE_EXISTS":
      return friendlyBoard.some(m => minionHasTribe(m, cond.tribe));
    case "FRIENDLY_MINION_COUNT_GTE":
    case "FRIENDLY_MINION_COUNT_AT_LEAST":
      // A carta ainda está na mão, então o campo atual já corresponde a
      // "outros lacaios" para Battlecries como Niurau (exclude_self).
      return friendlyBoard.length >= amount;
    case "ENEMY_MINION_COUNT_GTE":
      return enemyBoard.length >= amount;
    case "HAND_SIZE_GTE":
      return (me.hand || []).length >= amount;
    case "FRIENDLY_MINION_EXISTS":
      return friendlyBoard.length > 0;
    case "ENEMY_MINION_EXISTS":
      return enemyBoard.length > 0;
    case "TARGET_HAS_TRIBE":
      return anyTargetCandidateForUi(context.targetDescs, minion => minionHasTribe(minion, cond.tribe));
    case "TARGET_ATTACK_LESS_THAN_SELF_ATTACK": {
      const selfAttack = handCard?.effective_attack ?? card.attack ?? 0;
      return anyTargetCandidateForUi(context.targetDescs, minion => (minion.attack ?? 0) < selfAttack);
    }
    case "OPPONENT_HAS_MORE_CARDS_IN_HAND":
      return (foe.hand_size ?? (foe.hand || []).length ?? 0) > (me.hand || []).length;
    case "ONLY_FRIENDLY_MINION":
      // Para um lacaio ainda na mão, ele será o único aliado logo após entrar
      // apenas se seu campo atual estiver vazio.
      return card.type === "MINION" && friendlyBoard.length === 0;
    case "CARD_TRIBE":
    case "PLAYED_CARD_TRIBE":
    case "SUMMONED_MINION_TRIBE":
      return cardHasTribeForUi(card, cond.tribe);
    default:
      // Condições dependentes de alvo escolhido, ataque/morte ou contexto do
      // servidor não são previsíveis só olhando a mão; não sinalizamos para
      // evitar uma borda enganosa.
      return false;
  }
}

function effectHasActiveConditionalForUi(eff, card, handCard, inheritedTargetDescs = []) {
  if (!eff) return false;
  const ownTargetDescs = chosenTargetDescsForEffect(eff);
  const targetDescs = ownTargetDescs.length ? ownTargetDescs : inheritedTargetDescs;
  if (eff.action === "CONDITIONAL_EFFECTS") {
    return evaluateHandConditionForUi(eff.condition || {}, card, handCard, { targetDescs });
  }
  if (eff.condition && evaluateHandConditionForUi(eff.condition, card, handCard, { targetDescs })) return true;
  if ((eff.target || {}).mode === "CHOSEN" && eff.target.required_tribe) {
    return anyTargetCandidateForUi([eff.target]);
  }
  for (const sub of (eff.effects || [])) {
    if (effectHasActiveConditionalForUi(sub, card, handCard, targetDescs)) return true;
  }
  for (const sub of (eff.additional_effects || [])) {
    if (effectHasActiveConditionalForUi(sub, card, handCard, targetDescs)) return true;
  }
  return false;
}

function effectHasActiveHandDependencyForUi(eff, handCard) {
  const target = eff.target || {};
  if (target.mode !== "NEXT_CARD_PLAYED_THIS_TURN") return false;
  return (target.valid || []).some(valid => {
    if (!valid.startsWith("CARD_WITH_TRIBE_")) return false;
    return handHasOtherCardWithTribe(handCard, valid.slice("CARD_WITH_TRIBE_".length));
  });
}

function getHandCardActivationSignal(handCard, card) {
  const effects = card.effects || [];
  const comboActive = (state.you?.cards_played_this_turn || 0) > 0;
  if (comboActive && effects.some(e => e.trigger === "ON_COMBO")) {
    return { active: true, reason: "Combo ativo: esta carta ativará o efeito de Combo." };
  }

  const playOrAuraEffects = effects.filter(e => e.trigger === "ON_PLAY" || e.trigger === "AURA");
  const playTargetDescs = [];
  for (const eff of playOrAuraEffects) collectChosenTargetDescsForEffect(eff, playTargetDescs);
  const activePlayConditional = playOrAuraEffects
    .some(e => effectHasActiveConditionalForUi(e, card, handCard, playTargetDescs));
  if (activePlayConditional) {
    return { active: true, reason: "Condição cumprida: o efeito ao ser jogado será ativado." };
  }

  const activeInHandConditional = effects
    .filter(e => e.trigger === "IN_HAND")
    .some(e => effectHasActiveConditionalForUi(e, card, handCard));
  if (activeInHandConditional) {
    return { active: true, reason: "Condição cumprida: o efeito ativo na mão está ligado." };
  }

  const activeHandDependency = effects
    .filter(e => e.trigger === "ON_PLAY")
    .some(e => effectHasActiveHandDependencyForUi(e, handCard));
  if (activeHandDependency) {
    return { active: true, reason: "Há uma carta na mão que aproveita este efeito ao ser jogado." };
  }

  return { active: false, reason: "" };
}

function effectsForPlayMode(card, opts = {}) {
  const effects = card.effects || [];
  if (opts.empowered) {
    const empoweredEffects = effects.filter(e =>
      e.trigger === "ON_PLAY_EMPOWERED" || e.trigger === "ON_EMPOWER"
    );
    if (empoweredEffects.length) return empoweredEffects;
  }
  const result = effects.filter(e => e.trigger === "ON_PLAY");
  const comboActive = (state.you?.cards_played_this_turn || 0) > 0;
  if (comboActive) {
    result.push(...effects.filter(e => e.trigger === "ON_COMBO"));
  }
  return result;
}

function playHandCardWithMode(handCard, card, opts = {}) {
  const effects = effectsForPlayMode(card, opts);
  const targetDescs = collectChosenTargetDescsForPlay(card, opts);
  const chosenEffect = effects.find(effectNeedsChosenTargetForPlay);
  const hasUsableTarget = targetDescs.length > 0 && hasValidChosenTarget(targetDescs[0]);
  if (chosenEffect && hasUsableTarget) {
    targetingMode = {
      hand_id: handCard.instance_id,
      card,
      empowered: !!opts.empowered,
      requiresDirection: effects.some(effectNeedsAdjacentDirection),
      targetDescs,
      targets: [],
    };
    const first = targetDescs[0] || {};
    const hint = first.valid && first.valid.includes("FRIENDLY_MINION")
      ? "Escolha um lacaio aliado"
      : first.valid && first.valid.includes("ENEMY_MINION")
        ? "Escolha um lacaio inimigo"
        : "Escolha um alvo";
    toast(`${hint} (ESC para cancelar)`);
    render();
    return;
  }
  sendPlayCard({ hand_id: handCard.instance_id, empowered: !!opts.empowered });
}

function showEmpowerModal(handCard, card) {
  clearPendingChoiceOverlay();
  const overlay = document.createElement("div");
  overlay.className = "choose-one-overlay pending-choice-overlay";

  const title = document.createElement("h2");
  title.textContent = "Fortalecer carta?";
  overlay.appendChild(title);

  const msg = document.createElement("div");
  msg.className = "muted";
  msg.textContent = "Fortalecer custa 1 de mana a mais e usa o efeito fortalecido do feitiço.";
  overlay.appendChild(msg);

  const row = document.createElement("div");
  row.className = "row";
  row.style.justifyContent = "center";

  const normal = document.createElement("button");
  normal.className = "btn";
  normal.textContent = "Normal";
  normal.onclick = () => {
    clearPendingChoiceOverlay();
    playHandCardWithMode(handCard, card, { empowered: false });
  };
  row.appendChild(normal);

  const empowered = document.createElement("button");
  empowered.className = "btn primary";
  empowered.textContent = "Fortalecer (+1)";
  empowered.onclick = () => {
    const baseCost = handCard.effective_cost ?? handCard.cost_override ?? card.cost ?? 0;
    if (state.you.mana < baseCost + 1) {
      toast("Mana insuficiente para fortalecer");
      return;
    }
    clearPendingChoiceOverlay();
    playHandCardWithMode(handCard, card, { empowered: true });
  };
  row.appendChild(empowered);

  overlay.appendChild(row);
  document.getElementById("overlay-root").appendChild(overlay);
}


function onHandCardClick(handCard, card) {
  // Ignora o click sintético que vem logo depois de um drag.
  if (dragJustEnded) return;
  if (state.current_player !== myPid) { toast("Não é seu turno"); return; }
  const cost = handCard.effective_cost ?? handCard.cost_override ?? card.cost ?? 0;
  // Tomo Amaldiçoado libera clique mesmo sem mana, pagando vida.
  const spellPaysHealth = card.type === "SPELL" && state.you.next_spell_costs_health === true;
  if (state.you.mana < cost && !spellPaysHealth) { toast("Mana insuficiente"); return; }
  if (spellPaysHealth && state.you.hero_health <= cost) { toast("Vida insuficiente para pagar este feitiço"); return; }
  if (card.type === "MINION" && state.you.board.length >= 7) { toast("Campo cheio"); return; }

  // === CHOOSE_ONE ===
  // Detecta se a carta tem ação CHOOSE_ONE no ON_PLAY. Se sim, abre modal
  // para o jogador escolher uma das opções, depois prossegue com a jogada
  // (com alvo, se necessário).
  const chooseEffect = (card.effects || []).find(e =>
    e.trigger === "ON_PLAY" && e.action === "CHOOSE_ONE"
  );
  if (chooseEffect && (chooseEffect.choices || []).length > 1) {
    showChooseOneModal(handCard, card, chooseEffect);
    return;
  }

  const hasEmpower = (card.tags || []).includes("EMPOWER")
    && (card.effects || []).some(e => e.trigger === "ON_PLAY_EMPOWERED" || e.trigger === "ON_EMPOWER");
  if (hasEmpower) {
    showEmpowerModal(handCard, card);
    return;
  }

  playHandCardWithMode(handCard, card, { empowered: false });
}

// Modal interativa para CHOOSE_ONE: 2-N opções, jogador clica uma, mandamos
// `chose_index` no play_card. Se a opção escolhida pede alvo, entra em modo
// de targeting depois.
function showChooseOneModal(handCard, card, chooseEffect) {
  const overlay = document.createElement("div");
  overlay.className = "choose-one-overlay";

  const title = document.createElement("h2");
  title.textContent = "Escolha uma opção";
  overlay.appendChild(title);

  const subtitle = document.createElement("div");
  subtitle.className = "subtitle";
  subtitle.textContent = card.name;
  overlay.appendChild(subtitle);

  const optsBox = document.createElement("div");
  optsBox.className = "choose-options";

  (chooseEffect.choices || []).forEach((choice, idx) => {
    const btn = document.createElement("button");
    const numLabel = document.createElement("div");
    numLabel.className = "opt-num";
    numLabel.textContent = (idx === 0 ? "Opção 1" : (idx === 1 ? "Opção 2" : `Opção ${idx + 1}`));
    btn.appendChild(numLabel);

    const txt = document.createElement("div");
    txt.className = "opt-text";
    txt.textContent = describeChoice(choice);
    btn.appendChild(txt);

    btn.onclick = () => {
      overlay.remove();
      // Após escolha: se essa opção exige alvo, entra em targeting; senão joga direto.
      const targetDescs = collectChosenTargetDescsForEffect(choice, []);
      if (targetDescs.length > 0 && hasValidChosenTarget(targetDescs[0])) {
        targetingMode = {
          hand_id: handCard.instance_id,
          card,
          chose_index: idx,
          targetDescs,
          targets: [],
        };
        toast("Escolha um alvo (ESC para cancelar)");
        render();
      } else {
        sendPlayCard({ hand_id: handCard.instance_id, chose_index: idx });
      }
    };
    optsBox.appendChild(btn);
  });
  overlay.appendChild(optsBox);

  // Botão de cancelar
  const cancel = document.createElement("button");
  cancel.className = "btn small";
  cancel.style.marginTop = "0.6rem";
  cancel.textContent = "Cancelar";
  cancel.onclick = () => overlay.remove();
  overlay.appendChild(cancel);

  document.getElementById("overlay-root").appendChild(overlay);
}

// Tenta gerar um texto humano descrevendo cada choice
function describeChoice(choice) {
  const action = choice.action;
  const amount = choice.amount;
  const option = choice.option ? `[${choice.option}] ` : "";
  const atkAmount = choice.attack_amount ?? choice.attack_bonus ?? (typeof amount === "object" ? amount.attack : amount);
  const hpAmount = choice.health_amount ?? choice.health_bonus ?? (typeof amount === "object" ? amount.health : amount);
  const tgt = choice.target || {};
  const targetText = (() => {
    if (tgt.mode === "ENEMY_MINIONS") return "todos os lacaios inimigos";
    if (tgt.mode === "ALL_ENEMY_MINIONS") return "todos os lacaios inimigos";
    if (tgt.mode === "ALL_FRIENDLY_MINIONS") return "todos os lacaios aliados";
    if (tgt.mode === "ALL_MINIONS") return "todos os lacaios";
    if (tgt.mode === "CHOSEN") return "um alvo escolhido";
    if (tgt.mode === "ENEMY_HERO") return "o herói inimigo";
    if (tgt.mode === "FRIENDLY_HERO") return "seu herói";
    return "";
  })();

  if (action === "DAMAGE") {
    return `Cause ${amount ?? 1} de dano${targetText ? " a " + targetText : ""}`;
  }
  if (action === "HEAL") {
    return `Cure ${amount ?? 1}${targetText ? " em " + targetText : ""}`;
  }
  if (action === "BUFF_STATS") {
    return `${option}Conceda +${atkAmount ?? 0}/+${hpAmount ?? 0}${targetText ? " a " + targetText : ""}`;
  }
  if (action === "ADD_TAG") {
    const names = { DIVINE_SHIELD: "Escudo Divino", TAUNT: "Provocar", STEALTH: "Furtividade", RUSH: "Rapidez", CHARGE: "Investida" };
    return `${option}Conceda ${names[choice.tag] || choice.tag || "keyword"}${targetText ? " a " + targetText : ""}`;
  }
  if (action === "BUFF_ATTACK") {
    return `+${amount} de ataque${targetText ? " em " + targetText : ""}`;
  }
  if (action === "BUFF_HEALTH") {
    return `+${amount} de vida${targetText ? " em " + targetText : ""}`;
  }
  if (action === "SET_ATTACK") {
    return `Defina o ataque para ${amount}${targetText ? " em " + targetText : ""}`;
  }
  if (action === "FREEZE") {
    return `Congele${targetText ? " " + targetText : ""}`;
  }
  if (action === "DESTROY") {
    return `Destrua${targetText ? " " + targetText : ""}`;
  }
  if (action === "DRAW_CARD") {
    return `Compre ${amount ?? 1} carta${(amount ?? 1) > 1 ? "s" : ""}`;
  }
  // fallback genérico
  return action.replace(/_/g, " ").toLowerCase();
}

// Replica leve da lógica do backend pra o cliente decidir se pede alvo.
// Mantém o jogo fluido - sem isso, qualquer carta com 'CHOSEN' pediria alvo
// mesmo quando ele não existe.
function hasValidChosenTarget(targetDesc) {
  const valid = targetDesc.valid || [];
  const me = state.you;
  const opp = state.opponent;
  let candidates = [];
  for (const v of valid) {
    if (v === "FRIENDLY_MINION") candidates.push(...me.board);
    else if (v === "ENEMY_MINION") candidates.push(...opp.board);
    else if (v === "ANY_MINION" || v === "MINION") candidates.push(...me.board, ...opp.board);
    else if (v === "FRIENDLY_HERO") candidates.push("me");
    else if (v === "ENEMY_HERO") candidates.push("opp");
    else if (v === "ANY_HERO") candidates.push("me", "opp");
    else if (v === "ANY_CHARACTER") candidates.push(...me.board, ...opp.board, "me", "opp");
    else if (v === "FRIENDLY_CHARACTER") candidates.push(...me.board, "me");
    else if (v === "ENEMY_CHARACTER") candidates.push(...opp.board, "opp");
    else if (v === "OTHER_FRIENDLY_MINION") candidates.push(...me.board);
  }
  // filtra stealth/immune
  candidates = candidates.filter(c => {
    if (typeof c === "string") return true;
    if ((c.tags || []).includes("DORMANT")) return false;
    if (c.owner !== myPid && (c.keywords || []).includes("STEALTH")) return false;
    if (c.immune) return false;
    const tribe = targetDesc.required_tribe || targetDesc.tribe;
    const tribes = targetDesc.tribes || (tribe ? [tribe] : []);
    if (tribes.length && !tribes.some(t => (c.tribes || []).includes(t) || (t === "COMIDA" && (c.tribes || []).includes("FRUTA")))) return false;
    return true;
  });
  if (!valid.length) return true;
  return candidates.length > 0;
}

function onMyMinionClick(m) {
  if (targetingMode || abilityMode) {
    onTargetClick(m.instance_id);
    return;
  }
  if (state.current_player !== myPid) return;
  if (!m.can_attack) {
    if (m.summoning_sick && !m.tags.includes("CHARGE") && !m.tags.includes("RUSH")) {
      toast("Lacaio com sono de invocação");
    } else if (m.frozen) {
      toast("Lacaio congelado");
    } else if (m.attacks_this_turn > 0) {
      toast("Já atacou este turno");
    }
    return;
  }
  attackingMode = { attacker_id: m.instance_id };
  toast("Selecione um alvo para atacar");
  render();
}
